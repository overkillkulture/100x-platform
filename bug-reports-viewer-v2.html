<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Bug Reports V2 - Commander Two-Way Communication</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e8e8e8;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            text-align: center;
            background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .subtitle {
            text-align: center;
            color: #00ff41;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 68, 68, 0.1);
            border: 2px solid #ff4444;
            border-radius: 12px;
            padding: 20px;
            min-width: 200px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            color: #ff4444;
            font-weight: bold;
        }

        .stat-label {
            color: #b8b8b8;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .bug-report {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff4444;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .bug-report.unread {
            border-color: #00ff41;
            background: rgba(0, 255, 65, 0.05);
        }

        .bug-report:hover {
            background: rgba(255, 68, 68, 0.1);
            transform: translateX(10px);
        }

        .bug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 68, 68, 0.3);
        }

        .bug-timestamp {
            color: #00ff41;
            font-size: 1rem;
        }

        .bug-page {
            color: #b8b8b8;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .bug-description {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            color: #00ff41;
            font-size: 1.1rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .debug-info {
            background: rgba(255, 68, 68, 0.1);
            border: 2px solid #ff4444;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .debug-info-collapsed {
            cursor: pointer;
            padding: 10px 15px;
            background: rgba(255, 68, 68, 0.2);
            border: 2px solid #ff4444;
            border-radius: 8px;
            color: #ff4444;
            text-align: center;
        }

        .debug-info-collapsed:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        .debug-info pre {
            color: #ff4444;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .response-section {
            background: rgba(0, 255, 65, 0.1);
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        .response-input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #00ff41;
            border-radius: 8px;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            margin-bottom: 10px;
            resize: vertical;
            min-height: 80px;
        }

        .response-button {
            background: linear-gradient(135deg, #00ff41, #00cc33);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .response-button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 255, 65, 0.5);
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.5);
        }

        .clear-all-btn {
            background: linear-gradient(135deg, #cc0000, #990000);
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 20px auto;
            display: block;
            transition: all 0.3s;
        }

        .clear-all-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(204, 0, 0, 0.5);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #00ff41;
            font-size: 1.5rem;
        }

        .quick-responses {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .quick-response-btn {
            background: rgba(0, 255, 65, 0.2);
            border: 1px solid #00ff41;
            padding: 5px 10px;
            border-radius: 6px;
            color: #00ff41;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .quick-response-btn:hover {
            background: rgba(0, 255, 65, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐛 Bug Reports Dashboard V2 🐛</h1>
        <div class="subtitle">✨ Now with two-way communication & auto-debug capture ✨</div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalBugs">0</div>
                <div class="stat-label">Total Reports</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="unreadBugs">0</div>
                <div class="stat-label">Unread</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayBugs">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="uniquePages">0</div>
                <div class="stat-label">Unique Pages</div>
            </div>
        </div>

        <div id="bugReports"></div>
    </div>

    <script>
        let lastBugCount = 0;

        function loadBugReports() {
            const bugReportsContainer = document.getElementById('bugReports');

            // Get bug reports from localStorage
            let bugReports = [];
            try {
                const stored = localStorage.getItem('bug_reports');
                if (stored) {
                    bugReports = JSON.parse(stored);
                }
            } catch (e) {
                console.error('Error loading bug reports:', e);
            }

            // Play notification if new bugs
            if (bugReports.length > lastBugCount && lastBugCount > 0) {
                playBing();
            }
            lastBugCount = bugReports.length;

            // Update stats
            document.getElementById('totalBugs').textContent = bugReports.length;

            // Count unread
            const unread = bugReports.filter(bug => !bug.read).length;
            document.getElementById('unreadBugs').textContent = unread;

            // Count today's bugs
            const today = new Date().toDateString();
            const todayBugs = bugReports.filter(bug => {
                const bugDate = new Date(bug.timestamp).toDateString();
                return bugDate === today;
            });
            document.getElementById('todayBugs').textContent = todayBugs.length;

            // Count unique pages
            const uniquePages = new Set(bugReports.map(bug => bug.page)).size;
            document.getElementById('uniquePages').textContent = uniquePages;

            // Display reports (most recent first)
            if (bugReports.length === 0) {
                bugReportsContainer.innerHTML = `
                    <div class="empty-state">
                        ✅ No bug reports yet!<br/>
                        <span style="font-size: 1rem; opacity: 0.7;">Users can submit bugs using the 🐛 button on any page.</span>
                    </div>
                `;
                return;
            }

            bugReportsContainer.innerHTML = bugReports.reverse().map((bug, index) => {
                const actualIndex = bugReports.length - 1 - index;
                const timestamp = new Date(bug.timestamp);
                const formattedTime = timestamp.toLocaleString();
                const pageUrl = new URL(bug.page);
                const pageName = pageUrl.pathname || '/';
                const unreadClass = bug.read ? '' : 'unread';

                return `
                    <div class="bug-report ${unreadClass}" id="bug-${bug.id}">
                        <div class="bug-header">
                            <div>
                                <div class="bug-timestamp">
                                    ${bug.read ? '' : '🔴 NEW - '}🕐 ${formattedTime}
                                </div>
                                <div class="bug-page">📄 ${pageName}</div>
                            </div>
                            <div>
                                ${!bug.read ? `<button class="response-button" onclick="markAsRead(${bug.id})">✓ Mark Read</button>` : ''}
                                <button class="delete-btn" onclick="deleteBug(${actualIndex})">
                                    🗑️ Delete
                                </button>
                            </div>
                        </div>

                        <div class="bug-description">
                            ${bug.description}
                        </div>

                        <!-- Debug Info -->
                        <div class="debug-info-collapsed" onclick="toggleDebugInfo(${bug.id})">
                            🔍 Show Auto-Captured Debug Info (${bug.debugInfo ? bug.debugInfo.errors.length + ' errors detected' : 'No debug data'})
                        </div>
                        <div class="debug-info" id="debug-${bug.id}" style="display: none;">
                            <pre>${bug.debugInfo ? JSON.stringify(bug.debugInfo, null, 2) : 'No debug info available'}</pre>
                        </div>

                        <!-- Response Section -->
                        <div class="response-section">
                            <strong style="color: #00ff41; display: block; margin-bottom: 10px;">📢 Send Response to User:</strong>
                            <textarea
                                id="response-${bug.id}"
                                class="response-input"
                                placeholder="Type your response... (e.g., 'Fixed! Please refresh the page.')"
                            ></textarea>

                            <div class="quick-responses">
                                <button class="quick-response-btn" onclick="setQuickResponse(${bug.id}, 'Fixed! Please refresh the page.')">
                                    ✅ Fixed - Refresh
                                </button>
                                <button class="quick-response-btn" onclick="setQuickResponse(${bug.id}, 'Working on it! Will notify when fixed.')">
                                    ⏳ Working on it
                                </button>
                                <button class="quick-response-btn" onclick="setQuickResponse(${bug.id}, 'Can you provide more details?')">
                                    ❓ Need more info
                                </button>
                                <button class="quick-response-btn" onclick="setQuickResponse(${bug.id}, 'This is expected behavior. Here\\'s why...')">
                                    ℹ️ Not a bug
                                </button>
                            </div>

                            <button class="response-button" onclick="sendResponse(${bug.id}, '${pageName}')">
                                📤 SEND RESPONSE TO USER
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            // Add clear all button
            if (bugReports.length > 0) {
                bugReportsContainer.innerHTML += `
                    <button class="clear-all-btn" onclick="clearAllBugs()">
                        🗑️ CLEAR ALL BUG REPORTS
                    </button>
                `;
            }
        }

        function toggleDebugInfo(bugId) {
            const debugDiv = document.getElementById(`debug-${bugId}`);
            if (debugDiv.style.display === 'none') {
                debugDiv.style.display = 'block';
            } else {
                debugDiv.style.display = 'none';
            }
        }

        function markAsRead(bugId) {
            let bugReports = JSON.parse(localStorage.getItem('bug_reports') || '[]');
            const bug = bugReports.find(b => b.id === bugId);
            if (bug) {
                bug.read = true;
                localStorage.setItem('bug_reports', JSON.stringify(bugReports));
                loadBugReports();
            }
        }

        function setQuickResponse(bugId, message) {
            document.getElementById(`response-${bugId}`).value = message;
        }

        function sendResponse(bugId, pageName) {
            const responseText = document.getElementById(`response-${bugId}`).value.trim();

            if (!responseText) {
                alert('⚠️ Please enter a response message first!');
                return;
            }

            // Get existing responses
            let responses = JSON.parse(localStorage.getItem('commander_responses') || '[]');

            // Add new response
            responses.push({
                id: Date.now(),
                bugId: bugId,
                page: pageName,
                message: responseText,
                timestamp: new Date().toISOString(),
                read: false
            });

            localStorage.setItem('commander_responses', JSON.stringify(responses));

            // Play success bing
            playBing();

            // Mark bug as read
            markAsRead(bugId);

            alert(`✅ Response sent to user!\n\nThey'll see it the next time they open the bug notepad on:\n${pageName}\n\nMessage: "${responseText}"`);

            // Clear the response input
            document.getElementById(`response-${bugId}`).value = '';
        }

        function deleteBug(index) {
            let bugReports = JSON.parse(localStorage.getItem('bug_reports') || '[]');
            bugReports.splice(index, 1);
            localStorage.setItem('bug_reports', JSON.stringify(bugReports));
            loadBugReports();
        }

        function clearAllBugs() {
            if (confirm('⚠️ Are you sure you want to delete ALL bug reports? This cannot be undone.')) {
                localStorage.removeItem('bug_reports');
                loadBugReports();
            }
        }

        function playBing() {
            // Simple notification bing using Web Audio API
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800; // Hz
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // Load on page load
        loadBugReports();

        // Refresh every 5 seconds and play bing if new bugs
        setInterval(loadBugReports, 5000);

        console.log('🐛 Bug Reports Dashboard V2 Loaded - Two-way communication active');
    </script>
