<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=0.5, user-scalable=yes">
    <title>Trinity Real-Time Communications</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #000 0%, #0a0a0a 50%, #1a0a0a 100%);
            color: #00ffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(26, 26, 46, 0.95);
            border-bottom: 3px solid #ff6b00;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #ff6b00, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .agent-selector {
            display: flex;
            gap: 10px;
        }

        .agent-btn {
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #00ffff;
            color: #00ffff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .agent-btn.active {
            background: rgba(0, 255, 255, 0.5);
            border-color: #ffd700;
        }

        .agent-btn:hover {
            background: rgba(0, 255, 255, 0.4);
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .agents-panel {
            width: 250px;
            background: rgba(26, 26, 46, 0.95);
            border-right: 3px solid #ff6b00;
            padding: 20px;
            overflow-y: auto;
        }

        .agent-card {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .agent-card.online {
            border-color: #00ff88;
        }

        .agent-name {
            font-size: 18px;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .agent-status {
            font-size: 12px;
            color: #888;
        }

        .agent-task {
            font-size: 14px;
            color: #00ffff;
            margin-top: 5px;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .message {
            background: rgba(0, 255, 255, 0.1);
            border-left: 3px solid #00ffff;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .message.C1 { border-left-color: #ff6b00; }
        .message.C2 { border-left-color: #ffd700; }
        .message.C3 { border-left-color: #00ff88; }
        .message.COMMANDER { border-left-color: #ff0066; }
        .message.system { border-left-color: #888; background: rgba(255, 255, 255, 0.05); }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .message-from {
            font-weight: bold;
            color: #ffd700;
        }

        .message-time {
            font-size: 12px;
            color: #888;
        }

        .message-content {
            color: #00ffff;
            line-height: 1.6;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff6b00;
            border-radius: 10px;
            color: #00ffff;
            font-family: 'Courier New', monospace;
            font-size: 16px;
        }

        .input-area input:focus {
            outline: none;
            border-color: #ffd700;
        }

        .input-area button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff6b00, #ffd700);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 0, 0.5);
        }

        .typing-indicator {
            font-size: 12px;
            color: #888;
            font-style: italic;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌀 Trinity Real-Time Communications</h1>
        <div class="agent-selector">
            <button class="agent-btn" onclick="selectAgent('C1')">C1 Mechanic</button>
            <button class="agent-btn" onclick="selectAgent('C2')">C2 Architect</button>
            <button class="agent-btn" onclick="selectAgent('C3')">C3 Oracle</button>
            <button class="agent-btn" onclick="selectAgent('COMMANDER')">Commander</button>
        </div>
    </div>

    <div class="main">
        <div class="agents-panel">
            <h3 style="color: #ffd700; margin-bottom: 15px;">Online Agents:</h3>
            <div id="agents-list"></div>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages"></div>
            <div class="typing-indicator" id="typing"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Type your message..." disabled>
                <button onclick="sendMessage()" disabled id="send-btn">SEND</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentAgent = null;
        let messages = JSON.parse(localStorage.getItem('trinity_messages') || '[]');
        let agentStatus = JSON.parse(localStorage.getItem('trinity_agent_status') || JSON.stringify({
            'C1': { online: false, task: 'Standby', lastSeen: null },
            'C2': { online: false, task: 'Standby', lastSeen: null },
            'C3': { online: false, task: 'Standby', lastSeen: null },
            'COMMANDER': { online: true, task: 'Monitoring', lastSeen: new Date().toISOString() }
        }));

        // Task coordination
        let activeTasks = JSON.parse(localStorage.getItem('trinity_tasks') || '[]');

        // Select agent
        function selectAgent(agent) {
            currentAgent = agent;

            // Update buttons
            document.querySelectorAll('.agent-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(agent)) {
                    btn.classList.add('active');
                }
            });

            // Enable input
            document.getElementById('message-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('message-input').focus();

            // Mark agent as online
            agentStatus[agent].online = true;
            agentStatus[agent].lastSeen = new Date().toISOString();
            updateAgentsList();
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();

            if (!content || !currentAgent) return;

            const message = {
                from: currentAgent,
                content: content,
                timestamp: new Date().toISOString(),
                type: 'chat'
            };

            messages.push(message);
            localStorage.setItem('trinity_messages', JSON.stringify(messages));

            input.value = '';
            renderMessages();

            // Update agent status
            agentStatus[currentAgent].lastSeen = new Date().toISOString();
            updateAgentsList();
        }

        // Render messages
        function renderMessages() {
            const container = document.getElementById('messages');
            container.innerHTML = '';

            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.from}`;

                const time = new Date(msg.timestamp).toLocaleTimeString();

                div.innerHTML = `
                    <div class="message-header">
                        <span class="message-from">${msg.from}</span>
                        <span class="message-time">${time}</span>
                    </div>
                    <div class="message-content">${msg.content}</div>
                `;

                container.appendChild(div);
            });

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        // Update agents list
        function updateAgentsList() {
            const container = document.getElementById('agents-list');
            container.innerHTML = '';

            Object.entries(agentStatus).forEach(([agent, status]) => {
                const div = document.createElement('div');
                div.className = `agent-card ${status.online ? 'online' : ''}`;

                const statusText = status.online ? '🟢 ONLINE' : '🔴 OFFLINE';
                const lastSeen = status.lastSeen
                    ? new Date(status.lastSeen).toLocaleTimeString()
                    : 'Never';

                div.innerHTML = `
                    <div class="agent-name">${agent}</div>
                    <div class="agent-status">${statusText}</div>
                    <div class="agent-task">Task: ${status.task}</div>
                    <div class="agent-status">Last: ${lastSeen}</div>
                `;

                container.appendChild(div);
            });
        }

        // Keyboard shortcuts
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Auto-refresh (simulate real-time)
        setInterval(() => {
            const currentScroll = document.getElementById('messages').scrollTop;
            const storedMessages = JSON.parse(localStorage.getItem('trinity_messages') || '[]');

            if (storedMessages.length !== messages.length) {
                messages = storedMessages;
                renderMessages();
            }
        }, 1000);

        // Initialize
        renderMessages();
        updateAgentsList();

        // Add system message
        if (messages.length === 0) {
            messages.push({
                from: 'SYSTEM',
                content: 'Trinity Real-Time Communications Active. Select your agent identity above to begin.',
                timestamp: new Date().toISOString(),
                type: 'system'
            });
            localStorage.setItem('trinity_messages', JSON.stringify(messages));
            renderMessages();
        }
    </script>

(function() {

    bugReporter.innerHTML = `

            .bug-fab:hover {
                transform: scale(1.1);
                box-shadow: 0 6px 30px rgba(255, 68, 68, 0.8);
            }

            @keyframes pulse {
                0%, 100% {
                    box-shadow: 0 4px 20px rgba(255, 68, 68, 0.5);
                }
                50% {
                    box-shadow: 0 4px 30px rgba(255, 68, 68, 0.8), 0 0 50px rgba(255, 68, 68, 0.3);
                }
            }

            .bug-panel {
                position: absolute;
                bottom: 100px;
                right: 0;
                width: 400px;
                max-height: 600px;
                background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
                border: 3px solid #ff4444;
                border-radius: 15px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                display: none;
                overflow: hidden;
            }

            .bug-panel.active {
                display: block;
                animation: slideUp 0.3s ease-out;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .bug-panel-header {
                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                color: #fff;
                padding: 20px;
                font-size: 1.3rem;
                font-weight: bold;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .bug-panel-close {
                background: none;
                border: none;
                color: #fff;
                font-size: 1.5rem;
                cursor: pointer;
                width: 30px;
                height: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                transition: background 0.2s;
            }

            .bug-panel-close:hover {
                background: rgba(255, 255, 255, 0.2);
            }

            .bug-panel-body {
                padding: 20px;
                color: #e8e8e8;
                max-height: 500px;
                overflow-y: auto;
            }

            .bug-notice {
                background: rgba(0, 255, 65, 0.1);
                border-left: 4px solid #00ff41;
                padding: 15px;
                margin-bottom: 20px;
                border-radius: 5px;
                font-size: 0.95rem;
                line-height: 1.6;
            }

            .bug-notice strong {
                color: #00ff41;
            }

            .bug-form-group {
                margin-bottom: 20px;
            }

            .bug-form-label {
                display: block;
                color: #ff6666;
                font-weight: bold;
                margin-bottom: 8px;
                font-size: 0.95rem;
            }

            .bug-form-input,
            .bug-form-textarea {
                width: 100%;
                background: rgba(255, 255, 255, 0.05);
                border: 2px solid #444;
                border-radius: 8px;
                padding: 12px;
                color: #e8e8e8;
                font-family: 'Courier New', monospace;
                font-size: 0.95rem;
                transition: border-color 0.3s;
            }

            .bug-form-input:focus,
            .bug-form-textarea:focus {
                outline: none;
                border-color: #ff4444;
                background: rgba(255, 68, 68, 0.05);
            }

            .bug-form-textarea {
                min-height: 120px;
                resize: vertical;
            }

            .bug-submit-btn {
                width: 100%;
                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                color: #fff;
                border: none;
                padding: 15px;
                border-radius: 8px;
                font-size: 1.1rem;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.3s;
                font-family: 'Courier New', monospace;
            }

            .bug-submit-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(255, 68, 68, 0.4);
            }

            .bug-submit-btn:active {
                transform: translateY(0);
            }

            .bug-badge {
                position: absolute;
                top: -5px;
                right: -5px;
                background: #00ff41;
                color: #000;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.8rem;
                font-weight: bold;
                border: 2px solid #fff;
            }

            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-track {
                background: #1a1a1a;
            }

            ::-webkit-scrollbar-thumb {
                background: #ff4444;
                border-radius: 4px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #ff6666;
            }
        </style>

        <div class="bug-fab" onclick="toggleBugPanel()">
            🐛
            <div class="bug-badge">!</div>
        </div>

        <div class="bug-panel" id="bug-panel">
            <div class="bug-panel-header">
                <span>🐛 REPORT A BUG</span>
                <button class="bug-panel-close" onclick="toggleBugPanel()">✕</button>
            </div>
            <div class="bug-panel-body">
                <div class="bug-notice">
                    <strong>📢 We check bugs every couple hours!</strong><br><br>
                    Found something broken? Report it here and we'll fix it ASAP.
                    Every bug report helps make the platform better for everyone.
                </div>

                <form id="bug-report-form" onsubmit="submitBugReport(event)">
                    <div class="bug-form-group">
                        <label class="bug-form-label">What's broken? (Short description)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-title"
                               placeholder="e.g., Login button doesn't work"
                               required>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Tell us more (What happened?)</label>
                        <textarea class="bug-form-textarea"
                                  id="bug-description"
                                  placeholder="Describe what you were doing when the bug occurred..."
                                  required></textarea>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Your Name/PIN (Optional)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-reporter"
                               placeholder="e.g., Joshua (PIN 1001)">
                    </div>

                    <button type="submit" class="bug-submit-btn">
                        🚀 SUBMIT BUG REPORT
                    </button>
                </form>
            </div>
        </div>
    `;

    // Add to page
    document.body.appendChild(bugReporter);

    // Make functions global
    window.toggleBugPanel = function() {
        const panel = document.getElementById('bug-panel');
        panel.classList.toggle('active');
    };

    window.submitBugReport = function(event) {
        event.preventDefault();

        const bugData = {
            id: 'bug_' + Date.now(),
            timestamp: new Date().toISOString(),
            title: document.getElementById('bug-title').value,
            description: document.getElementById('bug-description').value,
            reporter: document.getElementById('bug-reporter').value || 'Anonymous',
            url: window.location.href,
            userAgent: navigator.userAgent
        };

        // Save to localStorage
        const bugs = JSON.parse(localStorage.getItem('bugReports') || '[]');
        bugs.push(bugData);
        localStorage.setItem('bugReports', JSON.stringify(bugs));

        // Try to save to server
        fetch('/api/bug-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bugData)
        }).catch(() => {
            // Fallback: save to local file
            const blob = new Blob([JSON.stringify(bugData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `bug_${Date.now()}.json`;
            a.click();
        });

        // Show success message
        alert('✅ BUG REPORTED!\n\nThanks for reporting this bug. We check reports every couple hours and will fix it ASAP.\n\nYour feedback makes the platform better!');

        // Reset form
        document.getElementById('bug-report-form').reset();
        toggleBugPanel();
    };
})();
</script>
