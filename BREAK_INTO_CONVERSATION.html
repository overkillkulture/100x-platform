            transform: translateX(5px);

            border-left-color: #666;

            cursor: not-allowed;

            border-left-color: #00ffff;
        }

            font-weight: bold;
            margin-bottom: 5px;
        }

        .service-status {
            font-size: 0.85em;
            color: #888;
        }

        .conversation-area {
            display: flex;
            flex-direction: column;
            height: 600px;
        }

            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px 8px 0 0;

            font-weight: bold;

            border-left: 4px solid #00ff88;
        }

            background: rgba(255, 200, 0, 0.2);
            border-left: 4px solid #ffc800;
        }

            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

            flex: 1;
        }

        .selected-services {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

            padding: 8px 15px;
            background: rgba(0, 255, 136, 0.2);

            border: 2px solid #00ff88;
            font-size: 0.9em;
        }

            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 1.5em;

</head>
<body>
    <div class="container">
        <header>
            <h1>📻 Break Into Any Conversation</h1>
            <p class="tagline">Direct Message System - Jump into any service conversation</p>
        </header>

        <div class="grid">
            <!-- Sidebar: Services -->
            <div>
                <div class="panel">
                    <h2>🚀 Select Services</h2>
                    <div class="service-list" id="servicesList">
                        <p style="color: #888;">Loading services...</p>
                    </div>
                </div>
            </div>

            <!-- Main: Conversation -->
            <div class="panel">
                <div class="action-buttons">
                    <button class="primary" onclick="createConversation()">💬 Create New Conversation</button>
                    <button class="danger" onclick="interceptConversation()">🔴 INTERCEPT (Break In!)</button>
                </div>

                <div class="selected-services" id="selectedServices">
                    <!-- Selected service chips will appear here -->
                </div>

                <div class="conversation-area">
                    <div id="conversationView">
                        <div class="no-conversation">
                            <div>
                                <p>Select services from the left</p>
                                <p style="font-size: 0.7em; margin-top: 10px;">Then create a conversation or intercept their messages!</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const NERVOUS_SYSTEM = 'http://localhost:7776';
        const INTERCOM = 'http://localhost:7778';

        let selectedServices = [];
        let currentConversation = null;
        let messagePolling = null;

        // Load services
        async function loadServices() {
            try {
                const response = await fetch(`${NERVOUS_SYSTEM}/services`);
                const data = await response.json();

                const list = document.getElementById('servicesList');
                list.innerHTML = '';

                data.services.forEach(service => {
                    const div = document.createElement('div');
                    div.className = `service ${service.status}`;
                    div.onclick = () => toggleService(service);
                    div.innerHTML = `
                        <div class="service-name">${service.name}</div>
                        <div class="service-status">ID: ${service.id} | ${service.status}</div>
                    `;
                    list.appendChild(div);
                });
            } catch (error) {
                console.error('Error loading services:', error);
            }
        }

        // Toggle service selection
        function toggleService(service) {
            if (service.status !== 'online') return;

            const index = selectedServices.findIndex(s => s.id === service.id);

            if (index > -1) {
                selectedServices.splice(index, 1);
            } else {
                selectedServices.push(service);
            }

            updateSelectedServices();
            updateServiceUI();
        }

        // Update selected services display
        function updateSelectedServices() {
            const container = document.getElementById('selectedServices');
            container.innerHTML = '';

            selectedServices.forEach(service => {
                const chip = document.createElement('div');
                chip.className = 'service-chip';
                chip.textContent = service.name;
                container.appendChild(chip);
            });
        }

        // Update service UI (highlight selected)
        function updateServiceUI() {
            document.querySelectorAll('.service').forEach(div => {
                const serviceName = div.querySelector('.service-name').textContent;
                const isSelected = selectedServices.some(s => s.name === serviceName);
                div.classList.toggle('selected', isSelected);
            });
        }

        // Create new conversation
        async function createConversation() {
            if (selectedServices.length === 0) {
                alert('Select at least one service first!');
                return;
            }

            const topic = prompt('Conversation topic:', 'Direct Message');
            if (!topic) return;

            const participants = selectedServices.map(s => s.id);
            participants.push('commander');

            try {
                const response = await fetch(`${INTERCOM}/conversations/create`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({topic, participants})
                });

                const data = await response.json();

                // Join the conversation
                await joinConversation(data.conversation_id);

            } catch (error) {
                console.error('Error creating conversation:', error);
                alert('Error: Could not create conversation. Is Intercom running?');
            }
        }

        // Intercept conversation (BREAK IN!)
        async function interceptConversation() {
            if (selectedServices.length === 0) {
                alert('Select services to intercept first!');
                return;
            }

            const targets = selectedServices.map(s => s.id);

            try {
                const response = await fetch(`${INTERCOM}/intercept/start`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: 'commander',
                        targets
                    })
                });

                const data = await response.json();

                // Show intercept started
                showConversation(data.conversation_id, data.targets.join(', '), true);

                addMessage({
                    from: 'SYSTEM',
                    from_name: 'INTERCEPT SYSTEM',
                    message: data.message,
                    timestamp: new Date().toISOString(),
                    type: 'intercept'
                });

                currentConversation = data.conversation_id;
                startMessagePolling();

            } catch (error) {
                console.error('Error intercepting:', error);
                alert('Error: Could not start intercept. Is Intercom running?');
            }
        }

        // Join conversation
        async function joinConversation(conversationId) {
            try {
                const response = await fetch(`${INTERCOM}/conversations/${conversationId}/join`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: 'commander',
                        user_name: 'Commander'
                    })
                });

                const data = await response.json();

                showConversation(conversationId, data.topic);
                currentConversation = conversationId;
                startMessagePolling();

            } catch (error) {
                console.error('Error joining conversation:', error);
            }
        }

        // Show conversation view
        function showConversation(conversationId, topic, isIntercept = false) {
            const view = document.getElementById('conversationView');
            view.innerHTML = `
                <div class="conversation-header">
                    <div class="conversation-topic">${isIntercept ? '🔴 INTERCEPTING: ' : '💬 '}${topic}</div>
                    <div class="participants">Conversation ID: ${conversationId}</div>
                </div>
                <div class="messages-container" id="messagesContainer"></div>
                <div class="input-area">
                    <div class="input-row">
                        <textarea id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"></textarea>
                    </div>
                    <div class="input-row">
                        <button class="primary" onclick="sendMessage()">Send Message</button>
                    </div>
                </div>
            `;
        }

        // Add message to display
        function addMessage(message) {
            const container = document.getElementById('messagesContainer');
            if (!container) return;

            const div = document.createElement('div');
            const messageClass = message.type === 'intercept' || message.from === 'SYSTEM' ? 'system' :
                                message.from === 'commander' ? 'commander' : 'service';

            div.className = `message ${messageClass}`;
            div.innerHTML = `
                <div class="message-header">
                    <div class="message-author">${message.from_name || message.from}</div>
                    <div class="message-time">${new Date(message.timestamp).toLocaleTimeString()}</div>
                </div>
                <div class="message-text">${message.message}</div>
            `;

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || !currentConversation) return;

            try {
                await fetch(`${INTERCOM}/conversations/${currentConversation}/send`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        from: 'commander',
                        from_name: 'Commander',
                        message
                    })
                });

                input.value = '';

                // Message will appear via polling

            } catch (error) {
                console.error('Error sending message:', error);
            }
        }

        // Poll for new messages
        let lastMessageCount = 0;
        async function pollMessages() {
            if (!currentConversation) return;

            try {
                const response = await fetch(`${INTERCOM}/conversations/${currentConversation}/messages?since=${lastMessageCount}`);
                const data = await response.json();

                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => addMessage(msg));
                    lastMessageCount = data.total;
                }
            } catch (error) {
                console.error('Error polling messages:', error);
            }
        }

        function startMessagePolling() {
            if (messagePolling) clearInterval(messagePolling);
            lastMessageCount = 0;
            messagePolling = setInterval(pollMessages, 2000);
        }

        // Initialize
        loadServices();
        setInterval(loadServices, 5000);
    </script>

                    box-shadow: 0 4px 30px rgba(255, 68, 68, 0.8), 0 0 50px rgba(255, 68, 68, 0.3);
                }
            }

                bottom: 100px;
                right: 0;

                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                color: #fff;
                padding: 20px;
                font-size: 1.3rem;
                font-weight: bold;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .bug-panel-close {
                background: none;
                border: none;
                color: #fff;
                font-size: 1.5rem;
                cursor: pointer;
                width: 30px;
                height: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                transition: background 0.2s;

                background: rgba(255, 255, 255, 0.2);
            }

            .bug-notice {
                background: rgba(0, 255, 65, 0.1);

        <div class="bug-fab" onclick="toggleBugPanel()">
            🐛
            <div class="bug-badge">!</div>
        </div>

        <div class="bug-panel" id="bug-panel">

                    Found something broken? Report it here and we'll fix it ASAP.
                    Every bug report helps make the platform better for everyone.
                </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">What's broken? (Short description)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-title"
                               placeholder="e.g., Login button doesn't work"
                               required>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Tell us more (What happened?)</label>
                        <textarea class="bug-form-textarea"
                                  id="bug-description"
                                  placeholder="Describe what you were doing when the bug occurred..."
                                  required></textarea>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Your Name/PIN (Optional)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-reporter"
                               placeholder="e.g., Joshua (PIN 1001)">
                    </div>

                        🚀 SUBMIT BUG REPORT
                    </button>
                </form>

    // Make functions global
    window.toggleBugPanel = function() {
        const panel = document.getElementById('bug-panel');
        panel.classList.toggle('active');
    };

    window.submitBugReport = function(event) {
        event.preventDefault();

        const bugData = {
            id: 'bug_' + Date.now(),
            timestamp: new Date().toISOString(),
            title: document.getElementById('bug-title').value,
            description: document.getElementById('bug-description').value,
            reporter: document.getElementById('bug-reporter').value || 'Anonymous',
            url: window.location.href,
            userAgent: navigator.userAgent
        };

        // Save to localStorage
        const bugs = JSON.parse(localStorage.getItem('bugReports') || '[]');
        bugs.push(bugData);
        localStorage.setItem('bugReports', JSON.stringify(bugs));

        // Try to save to server
        fetch('/api/bug-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bugData)
        }).catch(() => {
            // Fallback: save to local file
            const blob = new Blob([JSON.stringify(bugData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `bug_${Date.now()}.json`;
            a.click();
        });

        // Show success message
        alert('✅ BUG REPORTED!\n\nThanks for reporting this bug. We check reports every couple hours and will fix it ASAP.\n\nYour feedback makes the platform better!');

        // Reset form
        document.getElementById('bug-report-form').reset();
        toggleBugPanel();
    };
})();
</script>

    box-shadow: 0 4px 20px rgba(255, 68, 68, 0.5);
    font-family: Arial, sans-serif;
}

.kindergarten-bug-box h3 {
    color: #ff4444;
    margin: 0 0 10px 0;
    font-size: 1.1rem;
}

.kindergarten-bug-box textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    background: #1a1a1a;
    border: 2px solid #444;
    border-radius: 5px;
    color: #fff;
    font-size: 14px;
    resize: none;
    box-sizing: border-box;
}

.kindergarten-bug-box button {
    width: 100%;
    padding: 10px;
    background: #ff4444;

    border: none;
    border-radius: 5px;

    font-weight: bold;
    cursor: pointer;

    background: #ff6666;

    margin-top: 10px;
    padding: 8px;
    border-radius: 5px;
    text-align: center;

}

.kindergarten-bug-status.show {
    display: block;
}

.kindergarten-bug-status.success {
    background: #00ff41;
    color: #000;

</style>

<div class="kindergarten-bug-box">
    <h3>🐛 Found a Bug?</h3>
    <textarea id="kindergarten-bug-input" placeholder="Type what's broken and hit submit..."></textarea>
    <button onclick="submitKindergartenBug()">Submit Bug</button>
    <div id="kindergarten-bug-status" class="kindergarten-bug-status"></div>
</div>

<script>
function submitKindergartenBug() {
    const input = document.getElementById('kindergarten-bug-input');
    const status = document.getElementById('kindergarten-bug-status');
    const text = input.value.trim();

    if (!text) {
        alert('Please describe the bug!');
        return;
    }

    const user = localStorage.getItem('workspace_user_name') || localStorage.getItem('current_user') || 'Anonymous';
    const timestamp = new Date().toISOString();
    const bugEntry = `[${timestamp}] [${user}] ${text}\n`;

    // Save to localStorage
    const existingBugs = localStorage.getItem('kindergarten_bugs') || '';
    localStorage.setItem('kindergarten_bugs', existingBugs + bugEntry);

    // Show success
    status.textContent = '✅ Bug saved! Thanks!';
    status.className = 'kindergarten-bug-status success show';
    input.value = '';

    // Hide status after 3 seconds
    setTimeout(() => {
        status.className = 'kindergarten-bug-status';
    }, 3000);
}

// Auto-submit with Enter key (Shift+Enter for new line)
document.getElementById('kindergarten-bug-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitKindergartenBug();
    }
});
</script>

</body>
</html>
