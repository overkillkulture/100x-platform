<!DOCTYPE html>
<html>
<head>
    <title>100X Builder Gate</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .gate-container {
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #00ddff;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 221, 255, 0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00ddff 0%, #00ff00 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #0a0a0a;
            margin-bottom: 15px;
            box-shadow: 0 0 30px #00ddff;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        h1 {
            color: #00ff00;
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 20px #00ff00;
        }
        .tagline {
            color: #00ddff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
            text-shadow: 0 0 10px #00ddff;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #00ddff;
            font-weight: 600;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #00ddff;
            background: rgba(0, 221, 255, 0.05);
            color: #00ff00;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }
        input::placeholder, textarea::placeholder {
            color: rgba(0, 221, 255, 0.5);
        }
        textarea { resize: vertical; min-height: 100px; }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ddff 0%, #00ff00 100%);
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 221, 255, 0.5);
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.7);
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .status-message.success {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            color: #00ff00;
        }
        .status-message.error {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff0000;
            color: #ff0000;
        }
        .nav-links {
            text-align: center;
            margin-top: 20px;
        }
        .nav-links a {
            color: #00ddff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
        }
        .nav-links a:hover {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }
    </style>
</head>
<body>
    <div class="gate-container">
        <div class="logo"><div class="logo-circle">🌀</div></div>
        <h1>100X</h1>
        <p class="tagline">CONSCIOUSNESS AUTHENTICATION</p>

        <form id="gateForm">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567">
            </div>

            <div class="form-group">
                <label for="mission">Your Mission (Why are you building?) *</label>
                <textarea id="mission" name="mission" placeholder="Describe your mission and why you're building..." required></textarea>
            </div>

            <div class="form-group">
                <label for="values">Your Values (What matters to you?) *</label>
                <textarea id="values" name="values" placeholder="What principles guide your work and life?" required></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Enter the 100X</button>

            <div id="statusMessage" class="status-message"></div>
        </form>

        <div class="nav-links">
            <a href="mailto:contact@consciousnessrevolution.io">Contact</a>
        </div>
    </div>

    <script>
        // Airtable configuration - REAL CREDENTIALS
        const AIRTABLE_CONFIG = {
            baseId: 'app7F75X1unyGjPfd',
            tableName: 'tblnf4KNaOfbU5FgK',
            apiKey: 'patAbUog4LkER4Fbc.e2942db8dca37f951ad341e47796c5d23b268607341bb0603726e5ac006dee1a'
        };

        document.getElementById('gateForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const statusMessage = document.getElementById('statusMessage');

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            statusMessage.style.display = 'none';

            // Get form data
            const formData = {
                fields: {
                    'Name': document.getElementById('name').value,
                    'Email': document.getElementById('email').value,
                    'Phone': document.getElementById('phone').value || '',
                    'Mission': document.getElementById('mission').value,
                    'Values': document.getElementById('values').value,
                    'Submitted': new Date().toISOString()
                }
            };

            try {
                // Submit to Airtable
                const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_CONFIG.baseId}/${AIRTABLE_CONFIG.tableName}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${AIRTABLE_CONFIG.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    // Success
                    statusMessage.className = 'status-message success';
                    statusMessage.textContent = '✓ Welcome to the 100X! Check your email for next steps.';
                    statusMessage.style.display = 'block';

                    // Reset form
                    document.getElementById('gateForm').reset();
                    submitBtn.textContent = 'Enter the 100X';
                    submitBtn.disabled = false;
                } else {
                    throw new Error('Submission failed');
                }

            } catch (error) {
                // Error
                statusMessage.className = 'status-message error';
                statusMessage.innerHTML = '✗ Submission failed. Please email us directly: <a href="mailto:overkillkulture@gmail.com" style="color: #00ff00; text-decoration: underline;">overkillkulture@gmail.com</a>';
                statusMessage.style.display = 'block';

                submitBtn.textContent = 'Try Again';
                submitBtn.disabled = false;

                console.error('Submission error:', error);
            }
        });
    </script>
</body>
</html>
