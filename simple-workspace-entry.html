    <div class="container">
        <h1>🚀 Welcome Builder!</h1>

        <form id="profileForm">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>

            <div class="form-group">

        </form>

    <script>
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            // Generate simple user ID
            const userId = 'user_' + Date.now();

            // Save to localStorage
            localStorage.setItem('beta_user_name', name);
            localStorage.setItem('beta_user_email', email);
            localStorage.setItem('beta_user_pin', userId);
            localStorage.setItem('beta_login_time', new Date().toISOString());

            // Go to platform (the working builder)
            window.location.href = 'platform.html';
        });

        // Auto-fill if already have data
        window.addEventListener('load', () => {
            const existingName = localStorage.getItem('beta_user_name');
            const existingEmail = localStorage.getItem('beta_user_email');

            if (existingName) {
                document.getElementById('name').value = existingName;
            }
            if (existingEmail) {
                document.getElementById('email').value = existingEmail;
            }
        });
    </script>

<style>
.kindergarten-bug-box {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 350px;
    background: rgba(0, 0, 0, 0.95);
    border: 3px solid #ff4444;
    border-radius: 10px;
    padding: 15px;
    z-index: 999999;
    box-shadow: 0 4px 20px rgba(255, 68, 68, 0.5);
    font-family: Arial, sans-serif;
}

.kindergarten-bug-box h3 {
    color: #ff4444;
    margin: 0 0 10px 0;
    font-size: 1.1rem;
}

.kindergarten-bug-box textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    background: #1a1a1a;
    border: 2px solid #444;
    border-radius: 5px;
    color: #fff;
    font-size: 14px;
    resize: none;
    box-sizing: border-box;
}

.kindergarten-bug-box button {
    width: 100%;
    padding: 10px;
    background: #ff4444;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.kindergarten-bug-box button:hover {
    background: #ff6666;
}

.kindergarten-bug-status {
    margin-top: 10px;
    padding: 8px;
    border-radius: 5px;
    text-align: center;
    display: none;
    font-size: 13px;
}

.kindergarten-bug-status.show {
    display: block;
}

.kindergarten-bug-status.success {
    background: #00ff41;
    color: #000;
}
</style>

<div class="kindergarten-bug-box">
    <h3>🐛 Found a Bug?</h3>
    <textarea id="kindergarten-bug-input" placeholder="Type what's broken and hit submit..."></textarea>
    <button onclick="submitKindergartenBug()">Submit Bug</button>
    <div id="kindergarten-bug-status" class="kindergarten-bug-status"></div>
</div>

<script>
function submitKindergartenBug() {
    const input = document.getElementById('kindergarten-bug-input');
    const status = document.getElementById('kindergarten-bug-status');
    const text = input.value.trim();

    if (!text) {
        alert('Please describe the bug!');
        return;
    }

    const user = localStorage.getItem('workspace_user_name') || localStorage.getItem('current_user') || 'Anonymous';
    const timestamp = new Date().toISOString();
    const bugEntry = `[${timestamp}] [${user}] ${text}\n`;

    // Save to localStorage
    const existingBugs = localStorage.getItem('kindergarten_bugs') || '';
    localStorage.setItem('kindergarten_bugs', existingBugs + bugEntry);

    // Show success
    status.textContent = '✅ Bug saved! Thanks!';
    status.className = 'kindergarten-bug-status success show';
    input.value = '';

    // Hide status after 3 seconds
    setTimeout(() => {
        status.className = 'kindergarten-bug-status';
    }, 3000);
}

// Auto-submit with Enter key (Shift+Enter for new line)
document.getElementById('kindergarten-bug-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitKindergartenBug();
    }
});
</script>
