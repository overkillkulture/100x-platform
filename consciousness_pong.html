<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏓 Consciousness Pong - Consciousness Revolution</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 100%);
            color: #00ff41;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            color: #ff0080;
            font-size: 3em;
            text-shadow: 0 0 20px #ff0080;
            margin: 20px;
        }

        #game-container {
            position: relative;
            border: 4px solid #00ff41;
            box-shadow: 0 0 30px #00ff41;
        }

        canvas {
            display: block;
            background: #000;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3em;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            z-index: 10;
        }

        #instructions {
            text-align: center;
            color: #ffd700;
            font-size: 1.2em;
            margin: 20px;
            line-height: 1.8;
        }

        #cats-dogs {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 3em;
            cursor: pointer;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .easter-egg {
            position: fixed;
            font-size: 4em;
            pointer-events: none;
            animation: float 3s ease-in-out;
            z-index: 1000;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-200px) rotate(360deg); opacity: 0; }
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 4px solid #ff0080;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 100;
        }

        #game-over.show {
            display: block;
            animation: popIn 0.5s;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #game-over h2 {
            color: #ff0080;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        #game-over p {
            color: #00ff41;
            font-size: 1.3em;
            margin-bottom: 30px;
        }

        #game-over button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff0080, #ff00ff);
            border: 3px solid #00ff41;
            border-radius: 10px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
        }

        #game-over button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #ff0080;
        }
    </style>
</head>
<body>
    <h1>🏓 CONSCIOUSNESS PONG 🏓</h1>

    <div id="instructions">
        Use UP/DOWN arrows to control your paddle<br>
        First to 10 wins! 🏆<br>
        Click the cat/dog for surprises! 🐱🐶
    </div>

    <div id="game-container">
        <div id="score">0 - 0</div>
        <canvas id="pongCanvas" width="800" height="600"></canvas>
        <div id="game-over">
            <h2 id="winner-text">YOU WIN!</h2>
            <p id="final-score">Final Score: 10 - 5</p>
            <button onclick="restartGame()">Play Again</button>
            <button onclick="window.location.href='/'">Back to Home</button>
        </div>
    </div>

    <!-- Easter Egg Button -->
    <div id="cats-dogs" onclick="spawnCatDog()">
        🐱🐶
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddle = {
            width: 10,
            height: 100,
            y: canvas.height / 2 - 50,
            speed: 8,
            score: 0
        };

        const aiPaddle = {
            width: 10,
            height: 100,
            y: canvas.height / 2 - 50,
            speed: 6,
            score: 0
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            speedX: 5,
            speedY: 5,
            maxSpeed: 15
        };

        // Controls
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        // Update game
        function update() {
            // Player paddle movement
            if (keys['ArrowUp'] && paddle.y > 0) {
                paddle.y -= paddle.speed;
            }
            if (keys['ArrowDown'] && paddle.y < canvas.height - paddle.height) {
                paddle.y += paddle.speed;
            }

            // AI paddle movement (simple AI)
            const aiCenter = aiPaddle.y + aiPaddle.height / 2;
            if (ball.y < aiCenter - 10) {
                aiPaddle.y -= aiPaddle.speed;
            } else if (ball.y > aiCenter + 10) {
                aiPaddle.y += aiPaddle.speed;
            }
            aiPaddle.y = Math.max(0, Math.min(canvas.height - aiPaddle.height, aiPaddle.y));

            // Ball movement
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // Ball collision with top/bottom
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.speedY = -ball.speedY;
            }

            // Ball collision with player paddle
            if (ball.x - ball.radius < paddle.width &&
                ball.y > paddle.y &&
                ball.y < paddle.y + paddle.height) {
                ball.speedX = Math.abs(ball.speedX);
                ball.speedX = Math.min(ball.speedX * 1.1, ball.maxSpeed);
                const hitPos = (ball.y - paddle.y) / paddle.height - 0.5;
                ball.speedY += hitPos * 10;
            }

            // Ball collision with AI paddle
            if (ball.x + ball.radius > canvas.width - aiPaddle.width &&
                ball.y > aiPaddle.y &&
                ball.y < aiPaddle.y + aiPaddle.height) {
                ball.speedX = -Math.abs(ball.speedX);
                ball.speedX = Math.max(ball.speedX * 1.1, -ball.maxSpeed);
                const hitPos = (ball.y - aiPaddle.y) / aiPaddle.height - 0.5;
                ball.speedY += hitPos * 10;
            }

            // Score points
            if (ball.x < 0) {
                aiPaddle.score++;
                updateScore();
                resetBall();
            }
            if (ball.x > canvas.width) {
                paddle.score++;
                updateScore();
                resetBall();
            }

            // Check for winner
            if (paddle.score >= 10 || aiPaddle.score >= 10) {
                endGame();
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            ctx.strokeStyle = '#00ff41';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw paddles
            ctx.fillStyle = '#ff0080';
            ctx.fillRect(0, paddle.y, paddle.width, paddle.height);

            ctx.fillStyle = '#00ffff';
            ctx.fillRect(canvas.width - aiPaddle.width, aiPaddle.y, aiPaddle.width, aiPaddle.height);

            // Draw ball
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Draw glow effect on ball
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function updateScore() {
            document.getElementById('score').textContent = `${paddle.score} - ${aiPaddle.score}`;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.speedY = (Math.random() * 6 - 3);
        }

        function endGame() {
            const gameOver = document.getElementById('game-over');
            const winner = paddle.score >= 10 ? 'YOU WIN!' : 'AI WINS!';
            document.getElementById('winner-text').textContent = winner;
            document.getElementById('final-score').textContent = `Final Score: ${paddle.score} - ${aiPaddle.score}`;
            gameOver.classList.add('show');
        }

        function restartGame() {
            paddle.score = 0;
            aiPaddle.score = 0;
            updateScore();
            resetBall();
            document.getElementById('game-over').classList.remove('show');
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        // Cat/Dog Easter Egg
        let catDogToggle = true;
        function spawnCatDog() {
            const emoji = catDogToggle ? '🐱' : '🐶';
            catDogToggle = !catDogToggle;

            const easterEgg = document.createElement('div');
            easterEgg.className = 'easter-egg';
            easterEgg.textContent = emoji;
            easterEgg.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            easterEgg.style.top = window.innerHeight - 100 + 'px';

            document.body.appendChild(easterEgg);

            setTimeout(() => easterEgg.remove(), 3000);

            // Random silly message
            const messages = [
                "Meow! 🐱",
                "Woof! 🐶",
                "Consciousness level: Cat! 🐱",
                "Consciousness level: Dog! 🐶",
                "The cat sees through reality! 🐱",
                "Dogs are enlightened beings! 🐶"
            ];
            console.log('%c' + messages[Math.floor(Math.random() * messages.length)],
                       'color: #ffd700; font-size: 20px;');
        }

        console.log('%c🏓 CONSCIOUSNESS PONG LOADED!', 'color: #ff0080; font-size: 20px; font-weight: bold;');
        console.log('%c🐱🐶 Click the cat/dog button for surprises!', 'color: #ffd700; font-size: 14px;');
    </script>

    <script>
/**
 * FLOATING BUG REPORTER (INLINE)
 * Always-visible bug reporting widget in bottom-right corner
 */

(function() {
    // Create the floating bug reporter
    const bugReporter = document.createElement('div');
    bugReporter.id = 'floating-bug-reporter';
    bugReporter.innerHTML = `
        <style>
            #floating-bug-reporter {
                position: fixed;
                bottom: 20px;
                right: 20px;
                z-index: 999999;
                font-family: 'Courier New', monospace;
            }

            .bug-fab {
                width: 80px;
                height: 80px;
                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 2.5rem;
                cursor: pointer;
                box-shadow: 0 4px 20px rgba(255, 68, 68, 0.5);
                transition: all 0.3s;
                animation: pulse 2s infinite;
                border: 3px solid #fff;
            }

            .bug-fab:hover {
                transform: scale(1.1);
                box-shadow: 0 6px 30px rgba(255, 68, 68, 0.8);
            }

            @keyframes pulse {
                0%, 100% {
                    box-shadow: 0 4px 20px rgba(255, 68, 68, 0.5);
                }
                50% {
                    box-shadow: 0 4px 30px rgba(255, 68, 68, 0.8), 0 0 50px rgba(255, 68, 68, 0.3);
                }
            }

            .bug-panel {
                position: absolute;
                bottom: 100px;
                right: 0;
                width: 400px;
                max-height: 600px;
                background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
                border: 3px solid #ff4444;
                border-radius: 15px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                display: none;
                overflow: hidden;
            }

            .bug-panel.active {
                display: block;
                animation: slideUp 0.3s ease-out;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .bug-panel-header {
                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                color: #fff;
                padding: 20px;
                font-size: 1.3rem;
                font-weight: bold;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .bug-panel-close {
                background: none;
                border: none;
                color: #fff;
                font-size: 1.5rem;
                cursor: pointer;
                width: 30px;
                height: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                transition: background 0.2s;
            }

            .bug-panel-close:hover {
                background: rgba(255, 255, 255, 0.2);
            }

            .bug-panel-body {
                padding: 20px;
                color: #e8e8e8;
                max-height: 500px;
                overflow-y: auto;
            }

            .bug-notice {
                background: rgba(0, 255, 65, 0.1);
                border-left: 4px solid #00ff41;
                padding: 15px;
                margin-bottom: 20px;
                border-radius: 5px;
                font-size: 0.95rem;
                line-height: 1.6;
            }

            .bug-notice strong {
                color: #00ff41;
            }

            .bug-form-group {
                margin-bottom: 20px;
            }

            .bug-form-label {
                display: block;
                color: #ff6666;
                font-weight: bold;
                margin-bottom: 8px;
                font-size: 0.95rem;
            }

            .bug-form-input,
            .bug-form-textarea {
                width: 100%;
                background: rgba(255, 255, 255, 0.05);
                border: 2px solid #444;
                border-radius: 8px;
                padding: 12px;
                color: #e8e8e8;
                font-family: 'Courier New', monospace;
                font-size: 0.95rem;
                transition: border-color 0.3s;
            }

            .bug-form-input:focus,
            .bug-form-textarea:focus {
                outline: none;
                border-color: #ff4444;
                background: rgba(255, 68, 68, 0.05);
            }

            .bug-form-textarea {
                min-height: 120px;
                resize: vertical;
            }

            .bug-submit-btn {
                width: 100%;
                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                color: #fff;
                border: none;
                padding: 15px;
                border-radius: 8px;
                font-size: 1.1rem;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.3s;
                font-family: 'Courier New', monospace;
            }

            .bug-submit-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(255, 68, 68, 0.4);
            }

            .bug-submit-btn:active {
                transform: translateY(0);
            }

            .bug-badge {
                position: absolute;
                top: -5px;
                right: -5px;
                background: #00ff41;
                color: #000;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.8rem;
                font-weight: bold;
                border: 2px solid #fff;
            }

            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-track {
                background: #1a1a1a;
            }

            ::-webkit-scrollbar-thumb {
                background: #ff4444;
                border-radius: 4px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #ff6666;
            }
        </style>

        <div class="bug-fab" onclick="toggleBugPanel()">
            🐛
            <div class="bug-badge">!</div>
        </div>

        <div class="bug-panel" id="bug-panel">
            <div class="bug-panel-header">
                <span>🐛 REPORT A BUG</span>
                <button class="bug-panel-close" onclick="toggleBugPanel()">✕</button>
            </div>
            <div class="bug-panel-body">
                <div class="bug-notice">
                    <strong>📢 We check bugs every couple hours!</strong><br><br>
                    Found something broken? Report it here and we'll fix it ASAP.
                    Every bug report helps make the platform better for everyone.
                </div>

                <form id="bug-report-form" onsubmit="submitBugReport(event)">
                    <div class="bug-form-group">
                        <label class="bug-form-label">What's broken? (Short description)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-title"
                               placeholder="e.g., Login button doesn't work"
                               required>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Tell us more (What happened?)</label>
                        <textarea class="bug-form-textarea"
                                  id="bug-description"
                                  placeholder="Describe what you were doing when the bug occurred..."
                                  required></textarea>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Your Name/PIN (Optional)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-reporter"
                               placeholder="e.g., Joshua (PIN 1001)">
                    </div>

                    <button type="submit" class="bug-submit-btn">
                        🚀 SUBMIT BUG REPORT
                    </button>
                </form>
            </div>
        </div>
    `;

    // Add to page
    document.body.appendChild(bugReporter);

    // Make functions global
    window.toggleBugPanel = function() {
        const panel = document.getElementById('bug-panel');
        panel.classList.toggle('active');
    };

    window.submitBugReport = function(event) {
        event.preventDefault();

        const bugData = {
            id: 'bug_' + Date.now(),
            timestamp: new Date().toISOString(),
            title: document.getElementById('bug-title').value,
            description: document.getElementById('bug-description').value,
            reporter: document.getElementById('bug-reporter').value || 'Anonymous',
            url: window.location.href,
            userAgent: navigator.userAgent
        };

        // Save to localStorage
        const bugs = JSON.parse(localStorage.getItem('bugReports') || '[]');
        bugs.push(bugData);
        localStorage.setItem('bugReports', JSON.stringify(bugs));

        // Try to save to server
        fetch('/api/bug-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bugData)
        }).catch(() => {
            // Fallback: save to local file
            const blob = new Blob([JSON.stringify(bugData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `bug_${Date.now()}.json`;
            a.click();
        });

        // Show success message
        alert('✅ BUG REPORTED!\n\nThanks for reporting this bug. We check reports every couple hours and will fix it ASAP.\n\nYour feedback makes the platform better!');

        // Reset form
        document.getElementById('bug-report-form').reset();
        toggleBugPanel();
    };
})();
</script>
