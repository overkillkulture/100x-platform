[build]
  publish = "."
  command = "npm test"  # Run automated tests before deployment

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"

# Removed redirect - was causing issues with success page

[build.processing]
  skip_processing = false
