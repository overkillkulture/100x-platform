<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consciousness HUD Overlay - Always On Top</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: transparent;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            pointer-events: none;
        }

        /* CONTAINER - Allows clicks through to underlying content */
        .hud-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        /* TOP EDGE STATS BAR */
        .top-edge {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            opacity: 0.3;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .top-edge:hover {
            opacity: 1;
            height: 50px;
            background: rgba(0,0,0,0.9);
        }

        .top-stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
            color: #00ffff;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-value {
            font-weight: 700;
            color: #00ff00;
        }

        /* RIGHT EDGE QUICK ACCESS */
        .right-edge {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%) translateX(80%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px 0 0 12px;
            padding: 1rem 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: all 0.3s ease;
            pointer-events: auto;
            border: 1px solid rgba(0,255,255,0.2);
            border-right: none;
        }

        .right-edge:hover {
            transform: translateY(-50%) translateX(0);
        }

        .edge-btn {
            width: 44px;
            height: 44px;
            background: rgba(0,255,255,0.1);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 8px;
            color: #00ffff;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edge-btn:hover {
            background: rgba(0,255,255,0.3);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
        }

        /* BOTTOM EDGE COMMAND INPUT */
        .bottom-edge {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(80%);
            width: 600px;
            max-width: 90vw;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-radius: 12px 12px 0 0;
            padding: 1rem;
            border: 1px solid rgba(0,255,255,0.2);
            border-bottom: none;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .bottom-edge:hover,
        .bottom-edge:focus-within {
            transform: translateX(-50%) translateY(0);
        }

        .command-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .command-input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        .command-input::placeholder {
            color: #666;
        }

        /* LEFT EDGE MINI MAP */
        .left-edge {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%) translateX(-80%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 0 12px 12px 0;
            padding: 1rem 0.75rem;
            min-width: 150px;
            transition: all 0.3s ease;
            pointer-events: auto;
            border: 1px solid rgba(0,255,255,0.2);
            border-left: none;
        }

        .left-edge:hover {
            transform: translateY(-50%) translateX(0);
        }

        .mini-map-title {
            font-size: 0.75rem;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
            font-weight: 700;
        }

        .mini-map-item {
            font-size: 0.85rem;
            color: #888;
            padding: 0.5rem;
            margin: 0.25rem 0;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mini-map-item:hover {
            background: rgba(0,255,255,0.1);
            color: #00ffff;
        }

        .mini-map-item.active {
            background: rgba(0,255,255,0.2);
            color: #00ff00;
            border-left: 2px solid #00ff00;
        }

        /* FLOATING ACTION BUTTON (Bottom Right) */
        .fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00ffff, #00aaaa);
            border-radius: 50%;
            box-shadow: 0 8px 30px rgba(0,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            animation: float 3s ease-in-out infinite;
            border: none;
        }

        .fab:hover {
            transform: scale(1.15);
            box-shadow: 0 12px 40px rgba(0,255,255,0.7);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* POPUP MENU */
        .popup-menu {
            position: fixed;
            bottom: 6rem;
            right: 2rem;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 12px;
            padding: 1rem;
            min-width: 250px;
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .popup-menu.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .popup-menu-item {
            padding: 0.75rem 1rem;
            margin: 0.25rem 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .popup-menu-item:hover {
            background: rgba(0,255,255,0.1);
            color: #00ffff;
        }

        .popup-menu-icon {
            font-size: 1.2rem;
        }

        /* TOAST NOTIFICATION */
        .toast {
            position: fixed;
            top: 60px;
            right: 2rem;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,255,0,0.5);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            color: #00ff00;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateX(400px);
            transition: all 0.3s ease;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0,255,0,0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .top-stats {
                gap: 0.75rem;
                font-size: 0.75rem;
            }

            .bottom-edge {
                width: 95vw;
            }

            .left-edge,
            .right-edge {
                display: none;
            }
        }
    </style>
</head>

    <div class="hud-container">
        <!-- TOP EDGE: Stats Bar -->
        <div class="top-edge">
            <div class="top-stats">
                <div class="stat-item">
                    <span>🧠</span>
                    <span class="stat-value" id="consciousness">93%</span>
                </div>

                    <span class="stat-value" id="uptime">--</span>

                <div class="stat-item" style="cursor: pointer;" onclick="window.open('consciousness-workspace.html', '_blank')">

            <button class="edge-btn" title="Files" onclick="showToast('File browser opening...')">📁</button>
            <button class="edge-btn" title="Araya AI" onclick="showToast('Araya AI ready to chat!')">💬</button>
            <button class="edge-btn" title="Music" onclick="showToast('Music player starting...')">🎵</button>
            <button class="edge-btn" title="Settings" onclick="showToast('Settings panel coming soon!')">⚙️</button>
        </div>

        <!-- LEFT EDGE: Mini Map -->
        <div class="left-edge">
            <div class="mini-map-title">Active Projects</div>
            <div class="mini-map-item active">🎮 JARVIS HUD</div>
            <div class="mini-map-item">🎤 Voice Control</div>
            <div class="mini-map-item">📊 Workspace V2</div>
            <div class="mini-map-item">🌀 Trinity System</div>
        </div>

        <!-- BOTTOM EDGE: Command Input -->
        <div class="bottom-edge">
            <input
                type="text"
                class="command-input"
                id="commandInput"
                placeholder="Type a command or ask anything... (Ctrl+Space to focus)"
                onkeydown="if(event.key==='Enter') executeCommand()"
            />
        </div>

        <!-- FLOATING ACTION BUTTON -->
        <button class="fab" onclick="toggleMenu()">🌀</button>

        <!-- POPUP MENU -->
        <div class="popup-menu" id="popupMenu">
            <div class="popup-menu-item" onclick="menuAction('workspace')">
                <span class="popup-menu-icon">📊</span>
                <span>Open Full Workspace</span>
            </div>
            <div class="popup-menu-item" onclick="menuAction('jarvis')">
                <span class="popup-menu-icon">🎮</span>
                <span>JARVIS HUD</span>
            </div>
            <div class="popup-menu-item" onclick="menuAction('trinity')">
                <span class="popup-menu-icon">🌀</span>
                <span>Trinity Collaboration</span>
            </div>
            <div class="popup-menu-item" onclick="menuAction('voice')">
                <span class="popup-menu-icon">🎤</span>
                <span>Voice Commands</span>
            </div>

                <span class="popup-menu-icon">👁️</span>
                <span>Hide HUD Overlay</span>
            </div>
        </div>

        <!-- TOAST NOTIFICATION -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        let startTime = Date.now();

        // Update uptime
        setInterval(() => {
            const elapsed = Date.now() - startTime;
            const hours = Math.floor(elapsed / 3600000);
            const minutes = Math.floor((elapsed % 3600000) / 60000);
            document.getElementById('uptime').textContent = `${hours}h ${minutes}m`;
        }, 1000);

        // Toggle popup menu
        function toggleMenu() {
            const menu = document.getElementById('popupMenu');
            menu.classList.toggle('show');
        }

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('popupMenu');
            const fab = document.querySelector('.fab');
            if (!menu.contains(e.target) && !fab.contains(e.target)) {
                menu.classList.remove('show');
            }
        });

        // Menu actions
        function menuAction(action) {
            toggleMenu();

            switch(action) {
                case 'workspace':
                    window.open('consciousness-workspace.html', '_blank');
                    showToast('✅ Opening full workspace...');
                    break;
                case 'jarvis':
                    window.open('jarvis.html', '_blank');
                    showToast('🎮 JARVIS HUD launching...');
                    break;
                case 'trinity':
                    showToast('🌀 Trinity system activating...');
                    break;
                case 'voice':
                    showToast('🎤 Voice control guide opening...');
                    break;
                case 'hide':
                    document.body.style.opacity = '0';
                    setTimeout(() => {
                        showToast('HUD hidden. Refresh page to restore.');
                    }, 300);
                    break;
            }
        }

        // Show toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Execute command
        function executeCommand() {
            const input = document.getElementById('commandInput');
            const command = input.value.trim().toLowerCase();

            if (!command) return;

            // Simple command routing
            if (command.includes('workspace')) {
                menuAction('workspace');
            } else if (command.includes('jarvis') || command.includes('hud')) {
                menuAction('jarvis');
            } else if (command.includes('trinity')) {
                menuAction('trinity');
            } else if (command.includes('voice')) {
                menuAction('voice');
            } else {
                showToast(`Command received: "${command}"`);
            }

            input.value = '';
        }

        // Keyboard shortcut: Ctrl+Space to focus command input
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.code === 'Space') {
                e.preventDefault();
                document.getElementById('commandInput').focus();
            }
        });

        // Show welcome toast
        setTimeout(() => {
            showToast('🌌 HUD Overlay Active - Hover edges to reveal controls');
        }, 1000);
    </script>

                display: none;
                overflow: hidden;
            }

            .bug-panel.active {

                animation: slideUp 0.3s ease-out;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);

                    opacity: 1;
                    transform: translateY(0);

                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                color: #fff;
                padding: 20px;
                font-size: 1.3rem;
                font-weight: bold;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .bug-panel-close {
                background: none;
                border: none;
                color: #fff;
                font-size: 1.5rem;
                cursor: pointer;
                width: 30px;
                height: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                transition: background 0.2s;
            }

            .bug-panel-close:hover {
                background: rgba(255, 255, 255, 0.2);
            }

                padding: 20px;

                max-height: 500px;
                overflow-y: auto;
            }

            .bug-notice {
                background: rgba(0, 255, 65, 0.1);
                border-left: 4px solid #00ff41;

        <div class="bug-fab" onclick="toggleBugPanel()">
            🐛
            <div class="bug-badge">!</div>
        </div>

        <div class="bug-panel" id="bug-panel">

                <span>🐛 REPORT A BUG</span>
                <button class="bug-panel-close" onclick="toggleBugPanel()">✕</button>

                    Found something broken? Report it here and we'll fix it ASAP.
                    Every bug report helps make the platform better for everyone.
                </div>

                <form id="bug-report-form" onsubmit="submitBugReport(event)">
                    <div class="bug-form-group">
                        <label class="bug-form-label">What's broken? (Short description)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-title"
                               placeholder="e.g., Login button doesn't work"
                               required>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Tell us more (What happened?)</label>
                        <textarea class="bug-form-textarea"
                                  id="bug-description"
                                  placeholder="Describe what you were doing when the bug occurred..."
                                  required></textarea>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Your Name/PIN (Optional)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-reporter"
                               placeholder="e.g., Joshua (PIN 1001)">
                    </div>

                    <button type="submit" class="bug-submit-btn">
                        🚀 SUBMIT BUG REPORT
                    </button>
                </form>

    // Add to page
    document.body.appendChild(bugReporter);

    // Make functions global
    window.toggleBugPanel = function() {
        const panel = document.getElementById('bug-panel');
        panel.classList.toggle('active');
    };

    window.submitBugReport = function(event) {
        event.preventDefault();

        const bugData = {
            id: 'bug_' + Date.now(),
            timestamp: new Date().toISOString(),
            title: document.getElementById('bug-title').value,
            description: document.getElementById('bug-description').value,
            reporter: document.getElementById('bug-reporter').value || 'Anonymous',
            url: window.location.href,
            userAgent: navigator.userAgent
        };

        // Save to localStorage
        const bugs = JSON.parse(localStorage.getItem('bugReports') || '[]');
        bugs.push(bugData);
        localStorage.setItem('bugReports', JSON.stringify(bugs));

        // Try to save to server
        fetch('/api/bug-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bugData)
        }).catch(() => {
            // Fallback: save to local file
            const blob = new Blob([JSON.stringify(bugData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `bug_${Date.now()}.json`;
            a.click();
        });

        // Show success message
        alert('✅ BUG REPORTED!\n\nThanks for reporting this bug. We check reports every couple hours and will fix it ASAP.\n\nYour feedback makes the platform better!');

        // Reset form
        document.getElementById('bug-report-form').reset();
        toggleBugPanel();
    };
})();

<style>
.kindergarten-bug-box {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 350px;
    background: rgba(0, 0, 0, 0.95);
    border: 3px solid #ff4444;
    border-radius: 10px;
    padding: 15px;
    z-index: 999999;
    box-shadow: 0 4px 20px rgba(255, 68, 68, 0.5);
    font-family: Arial, sans-serif;
}

.kindergarten-bug-box h3 {
    color: #ff4444;
    margin: 0 0 10px 0;
    font-size: 1.1rem;
}

.kindergarten-bug-box textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    background: #1a1a1a;
    border: 2px solid #444;
    border-radius: 5px;
    color: #fff;
    font-size: 14px;
    resize: none;
    box-sizing: border-box;
}

.kindergarten-bug-box button {
    width: 100%;
    padding: 10px;
    background: #ff4444;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.kindergarten-bug-box button:hover {
    background: #ff6666;
}

.kindergarten-bug-status {
    margin-top: 10px;
    padding: 8px;
    border-radius: 5px;
    text-align: center;
    display: none;
    font-size: 13px;
}

.kindergarten-bug-status.show {
    display: block;
}

.kindergarten-bug-status.success {
    background: #00ff41;
    color: #000;
}
</style>

<div class="kindergarten-bug-box">
    <h3>🐛 Found a Bug?</h3>
    <textarea id="kindergarten-bug-input" placeholder="Type what's broken and hit submit..."></textarea>
    <button onclick="submitKindergartenBug()">Submit Bug</button>
    <div id="kindergarten-bug-status" class="kindergarten-bug-status"></div>
</div>

<script>
function submitKindergartenBug() {
    const input = document.getElementById('kindergarten-bug-input');
    const status = document.getElementById('kindergarten-bug-status');
    const text = input.value.trim();

    if (!text) {
        alert('Please describe the bug!');
        return;
    }

    const user = localStorage.getItem('workspace_user_name') || localStorage.getItem('current_user') || 'Anonymous';
    const timestamp = new Date().toISOString();
    const bugEntry = `[${timestamp}] [${user}] ${text}\n`;

    // Save to localStorage
    const existingBugs = localStorage.getItem('kindergarten_bugs') || '';
    localStorage.setItem('kindergarten_bugs', existingBugs + bugEntry);

    // Show success
    status.textContent = '✅ Bug saved! Thanks!';
    status.className = 'kindergarten-bug-status success show';
    input.value = '';

    // Hide status after 3 seconds
    setTimeout(() => {
        status.className = 'kindergarten-bug-status';
    }, 3000);
}

// Auto-submit with Enter key (Shift+Enter for new line)
document.getElementById('kindergarten-bug-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitKindergartenBug();
    }
});
</script>


    <!-- Simple Bug Reporter -->
    <script src="/BOOTSTRAP_BUG_WIDGET.js"></script>
</body>
</html>
