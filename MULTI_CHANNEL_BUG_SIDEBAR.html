<!-- MULTI-CHANNEL BUG REPORTER SIDEBAR -->
<!-- Shows ALL 5 ways to report bugs - stacked down the left side -->
<!-- At least ONE will work! -->
<!-- NOW WITH CLOSE BUTTON -->

<style>
.bug-sidebar {
    position: fixed;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 999999;
    font-family: monospace;
    transition: all 0.3s;
}

.bug-sidebar.minimized {
    left: -180px;
}

.bug-toggle {
    position: fixed;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255, 68, 68, 0.95);
    border: 2px solid #ff0000;
    border-radius: 0 10px 10px 0;
    padding: 15px 10px;
    color: white;
    cursor: pointer;
    z-index: 999998;
    font-size: 20px;
    transition: all 0.3s;
    display: none;
}

.bug-sidebar.minimized + .bug-toggle {
    display: block;
}

.bug-close-btn {
    position: absolute;
    top: -10px;
    right: -10px;
    background: #ff0000;
    border: 2px solid white;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    z-index: 10;
}

.bug-close-btn:hover {
    background: #cc0000;
    transform: scale(1.1);
}

.bug-option {
    background: rgba(255, 68, 68, 0.95);
    border: 2px solid #ff0000;
    border-radius: 10px;
    padding: 15px;
    width: 200px;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    position: relative;
}

.bug-option:hover {
    transform: scale(1.05);
    background: rgba(255, 0, 0, 0.95);
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
}

.bug-option strong {
    display: block;
    font-size: 16px;
    margin-bottom: 5px;
}

.bug-option small {
    font-size: 11px;
    opacity: 0.9;
}

.bug-input {
    width: 100%;
    padding: 8px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    background: rgba(0,0,0,0.8);
    color: white;
    font-size: 12px;
}

/* Mobile: Auto-minimize on small screens */
@media (max-width: 768px) {
    .bug-sidebar {
        left: -180px;
    }
    .bug-toggle {
        display: block;
    }
}
</style>

<div class="bug-sidebar" id="bug-sidebar">
    <!-- CLOSE BUTTON -->
    <div class="bug-close-btn" onclick="document.getElementById('bug-sidebar').classList.add('minimized')" title="Hide bug reporter">✕</div>

    <!-- OPTION 1: SMS -->
    <div class="bug-option" onclick="window.location.href='sms:+15092166552?body=Bug%20Report%3A%20'">
        <strong>📱 1. TEXT</strong>
        <small>Text to:<br>+1 (509) 216-6552</small>
    </div>

    <!-- OPTION 2: Quick Input -->
    <div class="bug-option" style="cursor: default;">
        <strong>⚡ 2. QUICK</strong>
        <input type="text" class="bug-input" id="quick-bug" placeholder="Type + Enter" onkeypress="if(event.key==='Enter'){
            fetch('/.netlify/functions/web-bug-report', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    title: this.value.substring(0,100),
                    description: this.value,
                    reporter: 'Quick Input'
                })
            });
            this.value='';
            this.placeholder='✅ Sent!';
            setTimeout(()=>this.placeholder='Type + Enter',2000);
        }">
    </div>

    <!-- OPTION 3: Email -->
    <div class="bug-option" onclick="window.location.href='mailto:darrick.preble@gmail.com?subject=Bug%20Report'">
        <strong>📧 3. EMAIL</strong>
        <small>Send to:<br>darrick.preble@gmail.com</small>
    </div>

    <!-- OPTION 4: Instagram DM -->
    <div class="bug-option" onclick="window.open('https://www.instagram.com/direct/t/', '_blank')">
        <strong>📷 4. INSTAGRAM</strong>
        <small>DM: @overkillkulture</small>
    </div>

    <!-- OPTION 5: GitHub Issue -->
    <div class="bug-option" onclick="window.open('https://github.com/overkillkulture/consciousness-bugs/issues/new', '_blank')">
        <strong>🐛 5. GITHUB</strong>
        <small>Create issue directly</small>
    </div>
</div>

<!-- TOGGLE BUTTON (shows when minimized) -->
<div class="bug-toggle" id="bug-toggle" onclick="document.getElementById('bug-sidebar').classList.remove('minimized')" title="Show bug reporter">
    🐛
</div>

<script>
// Make sure all 5 channels are functional
console.log('🚨 Multi-Channel Bug Reporter Active');
console.log('✅ 5 ways to report bugs available');
console.log('✕ NOW WITH CLOSE BUTTON!');
console.log('📱 SMS: +1 (509) 216-6552');
console.log('⚡ Quick Input: Type in sidebar');
console.log('📧 Email: darrick.preble@gmail.com');
console.log('📷 Instagram: @overkillkulture');
console.log('🐛 GitHub: consciousness-bugs repo');

// Auto-hide on mobile
if (window.innerWidth <= 768) {
    document.getElementById('bug-sidebar').classList.add('minimized');
}

// ESC key to close
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        document.getElementById('bug-sidebar').classList.add('minimized');
    }
});
</script>
