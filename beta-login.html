    <!-- Auth Gate System -->
    <script src="/auth-gate.js"></script>

    <script>
        const pinInputs = document.querySelectorAll('.pin-digit');
        const loginButton = document.getElementById('loginButton');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loginContainer = document.getElementById('loginContainer');

        // Auto-focus next input
        pinInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const value = e.target.value;

                // Only allow numbers
                if (!/^\d*$/.test(value)) {
                    e.target.value = '';
                    return;
                }

                // Move to next input
                if (value.length === 1 && index < 3) {
                    pinInputs[index + 1].focus();
                }

                // Clear error
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';

                // Enable login button if all 4 digits entered
                const allFilled = Array.from(pinInputs).every(input => input.value.length === 1);
                loginButton.disabled = !allFilled;
            });

            // Handle backspace
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    pinInputs[index - 1].focus();
                }

                // Handle Enter
                if (e.key === 'Enter' && loginButton.disabled === false) {
                    handleLogin();
                }
            });
        });

        function handleLogin() {
            const pin = Array.from(pinInputs).map(input => input.value).join('');

            if (pin.length !== 4) {
                showError('Please enter all 4 digits');
                return;
            }

            // Use AuthGate to login
            if (window.AuthGate.login(pin)) {
                const user = window.AuthGate.getCurrentUser();
                showSuccess(`Welcome back, ${user.name}!`);

                // Redirect after short delay
                setTimeout(() => {
                    // Check if there's a redirect parameter
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect') || '/beta-dashboard.html';
                    window.location.href = redirect;
                }, 1500);
            } else {
                showError('Invalid PIN - Please try again');
                clearInputs();
            }
        }

        function showError(message) {
            errorMessage.textContent = '❌ ' + message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
            loginContainer.classList.add('shake');
            setTimeout(() => loginContainer.classList.remove('shake'), 500);
        }

        function showSuccess(message) {
            successMessage.textContent = '✅ ' + message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function clearInputs() {
            pinInputs.forEach(input => input.value = '');
            pinInputs[0].focus();
            loginButton.disabled = true;
        }

        // Initial state
        loginButton.disabled = true;

        console.log('🔐 Beta login ready');
    </script>

(function() {

                }
                50% {
                    box-shadow: 0 4px 30px rgba(255, 68, 68, 0.8), 0 0 50px rgba(255, 68, 68, 0.3);
                }
            }

            .bug-panel {
                position: absolute;
                bottom: 100px;
                right: 0;
                width: 400px;
                max-height: 600px;
                background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
                border: 3px solid #ff4444;
                border-radius: 15px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                display: none;
                overflow: hidden;
            }

            .bug-panel.active {
                display: block;
                animation: slideUp 0.3s ease-out;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .bug-panel-header {
                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                color: #fff;
                padding: 20px;
                font-size: 1.3rem;
                font-weight: bold;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .bug-panel-close {
                background: none;
                border: none;
                color: #fff;
                font-size: 1.5rem;
                cursor: pointer;
                width: 30px;
                height: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                transition: background 0.2s;
            }

            .bug-panel-close:hover {
                background: rgba(255, 255, 255, 0.2);
            }

            .bug-panel-body {
                padding: 20px;
                color: #e8e8e8;
                max-height: 500px;
                overflow-y: auto;
            }

            .bug-notice {
                background: rgba(0, 255, 65, 0.1);
                border-left: 4px solid #00ff41;
                padding: 15px;
                margin-bottom: 20px;

        <div class="bug-fab" onclick="toggleBugPanel()">
            🐛
            <div class="bug-badge">!</div>
        </div>

        <div class="bug-panel" id="bug-panel">
            <div class="bug-panel-header">
                <span>🐛 REPORT A BUG</span>
                <button class="bug-panel-close" onclick="toggleBugPanel()">✕</button>

            <div class="bug-panel-body">
                <div class="bug-notice">
                    <strong>📢 We check bugs every couple hours!</strong><br><br>
                    Found something broken? Report it here and we'll fix it ASAP.
                    Every bug report helps make the platform better for everyone.
                </div>

                <form id="bug-report-form" onsubmit="submitBugReport(event)">
                    <div class="bug-form-group">
                        <label class="bug-form-label">What's broken? (Short description)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-title"
                               placeholder="e.g., Login button doesn't work"
                               required>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Tell us more (What happened?)</label>
                        <textarea class="bug-form-textarea"
                                  id="bug-description"
                                  placeholder="Describe what you were doing when the bug occurred..."
                                  required></textarea>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Your Name/PIN (Optional)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-reporter"
                               placeholder="e.g., Joshua (PIN 1001)">

    // Add to page
    document.body.appendChild(bugReporter);

    // Make functions global
    window.toggleBugPanel = function() {
        const panel = document.getElementById('bug-panel');
        panel.classList.toggle('active');
    };

    window.submitBugReport = function(event) {
        event.preventDefault();

        const bugData = {
            id: 'bug_' + Date.now(),
            timestamp: new Date().toISOString(),
            title: document.getElementById('bug-title').value,
            description: document.getElementById('bug-description').value,
            reporter: document.getElementById('bug-reporter').value || 'Anonymous',
            url: window.location.href,
            userAgent: navigator.userAgent
        };

        // Save to localStorage
        const bugs = JSON.parse(localStorage.getItem('bugReports') || '[]');
        bugs.push(bugData);
        localStorage.setItem('bugReports', JSON.stringify(bugs));

        // Try to save to server
        fetch('/api/bug-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bugData)
        }).catch(() => {
            // Fallback: save to local file
            const blob = new Blob([JSON.stringify(bugData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `bug_${Date.now()}.json`;
            a.click();
        });

        // Show success message
        alert('✅ BUG REPORTED!\n\nThanks for reporting this bug. We check reports every couple hours and will fix it ASAP.\n\nYour feedback makes the platform better!');

        // Reset form
        document.getElementById('bug-report-form').reset();
        toggleBugPanel();
    };
})();
</script>

<script>
function submitKindergartenBug() {
    const input = document.getElementById('kindergarten-bug-input');
    const status = document.getElementById('kindergarten-bug-status');
    const text = input.value.trim();

    if (!text) {
        alert('Please describe the bug!');
        return;
    }

    const user = localStorage.getItem('workspace_user_name') || localStorage.getItem('current_user') || 'Anonymous';
    const timestamp = new Date().toISOString();
    const bugEntry = `[${timestamp}] [${user}] ${text}\n`;

    // Save to localStorage
    const existingBugs = localStorage.getItem('kindergarten_bugs') || '';
    localStorage.setItem('kindergarten_bugs', existingBugs + bugEntry);

    // Show success
    status.textContent = '✅ Bug saved! Thanks!';
    status.className = 'kindergarten-bug-status success show';
    input.value = '';

    // Hide status after 3 seconds
    setTimeout(() => {
        status.className = 'kindergarten-bug-status';
    }, 3000);
}

// Auto-submit with Enter key (Shift+Enter for new line)
document.getElementById('kindergarten-bug-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitKindergartenBug();
    }
});
</script>
