<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Reports - Commander View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e8e8e8;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            text-align: center;
            background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 68, 68, 0.1);
            border: 2px solid #ff4444;
            border-radius: 12px;
            padding: 20px;
            min-width: 200px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            color: #ff4444;
            font-weight: bold;
        }

        .stat-label {
            color: #b8b8b8;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .bug-report {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff4444;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .bug-report:hover {
            background: rgba(255, 68, 68, 0.1);
            transform: translateX(10px);
        }

        .bug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 68, 68, 0.3);
        }

        .bug-timestamp {
            color: #00ff41;
            font-size: 1rem;
        }

        .bug-page {
            color: #b8b8b8;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .bug-description {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            color: #00ff41;
            font-size: 1.1rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .bug-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: #888;
            margin-top: 15px;
        }

        .bug-meta div {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 6px;
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.5);
        }

        .clear-all-btn {
            background: linear-gradient(135deg, #cc0000, #990000);
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 20px auto;
            display: block;
            transition: all 0.3s;
        }

        .clear-all-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(204, 0, 0, 0.5);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #00ff41;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐛 Bug Reports Dashboard 🐛</h1>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalBugs">0</div>
                <div class="stat-label">Total Reports</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayBugs">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="uniquePages">0</div>
                <div class="stat-label">Unique Pages</div>
            </div>
        </div>

        <div id="bugReports"></div>
    </div>

    <script>
        function loadBugReports() {
            const bugReportsContainer = document.getElementById('bugReports');

            // Get bug reports from localStorage
            let bugReports = [];
            try {
                const stored = localStorage.getItem('bug_reports');
                if (stored) {
                    bugReports = JSON.parse(stored);
                }
            } catch (e) {
                console.error('Error loading bug reports:', e);
            }

            // Update stats
            document.getElementById('totalBugs').textContent = bugReports.length;

            // Count today's bugs
            const today = new Date().toDateString();
            const todayBugs = bugReports.filter(bug => {
                const bugDate = new Date(bug.timestamp).toDateString();
                return bugDate === today;
            });
            document.getElementById('todayBugs').textContent = todayBugs.length;

            // Count unique pages
            const uniquePages = new Set(bugReports.map(bug => bug.page)).size;
            document.getElementById('uniquePages').textContent = uniquePages;

            // Display reports (most recent first)
            if (bugReports.length === 0) {
                bugReportsContainer.innerHTML = `
                    <div class="empty-state">
                        ✅ No bug reports yet!<br/>
                        <span style="font-size: 1rem; opacity: 0.7;">Users can submit bugs using the 🐛 button on any page.</span>
                    </div>
                `;
                return;
            }

            bugReportsContainer.innerHTML = bugReports.reverse().map((bug, index) => {
                const timestamp = new Date(bug.timestamp);
                const formattedTime = timestamp.toLocaleString();
                const pageUrl = new URL(bug.page);
                const pageName = pageUrl.pathname || '/';

                return `
                    <div class="bug-report">
                        <div class="bug-header">
                            <div>
                                <div class="bug-timestamp">🕐 ${formattedTime}</div>
                                <div class="bug-page">📄 ${pageName}</div>
                            </div>
                            <button class="delete-btn" onclick="deleteBug(${bugReports.length - 1 - index})">
                                🗑️ Delete
                            </button>
                        </div>

                        <div class="bug-description">
                            ${bug.description}
                        </div>

                        <div class="bug-meta">
                            <div>🖥️ ${bug.userAgent || 'Unknown browser'}</div>
                            <div>📏 ${bug.screenResolution || 'Unknown resolution'}</div>
                        </div>
                    </div>
                `;
            }).join('');

            // Add clear all button
            if (bugReports.length > 0) {
                bugReportsContainer.innerHTML += `
                    <button class="clear-all-btn" onclick="clearAllBugs()">
                        🗑️ CLEAR ALL BUG REPORTS
                    </button>
                `;
            }
        }

        function deleteBug(index) {
            let bugReports = JSON.parse(localStorage.getItem('bug_reports') || '[]');
            bugReports.splice(index, 1);
            localStorage.setItem('bug_reports', JSON.stringify(bugReports));
            loadBugReports();
        }

        function clearAllBugs() {
            if (confirm('⚠️ Are you sure you want to delete ALL bug reports? This cannot be undone.')) {
                localStorage.removeItem('bug_reports');
                loadBugReports();
            }
        }

        // Load on page load
        loadBugReports();

        // Refresh every 10 seconds
        setInterval(loadBugReports, 10000);

        console.log('🐛 Bug Reports Dashboard Loaded');
    </script>
</body>
</html>
