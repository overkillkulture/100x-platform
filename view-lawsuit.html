<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Lawsuit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .page-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 3px double #000;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .case-number {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .parties {
            margin: 2rem 0;
            line-height: 1.8;
        }

        .parties-header {
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .content {
            line-height: 1.8;
            text-align: justify;
        }

        .content h2 {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 2rem 0 1rem 0;
            text-align: center;
        }

        .content p {
            margin-bottom: 1rem;
            text-indent: 2rem;
        }

        .signature-block {
            margin-top: 3rem;
            text-align: left;
        }

        .action-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 1rem;
            z-index: 1000;
        }

        .action-button {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.4);
        }

        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 68, 68, 0.6);
        }

        .action-button.secondary {
            background: linear-gradient(135deg, #00ff41 0%, #00cc33 100%);
            box-shadow: 0 4px 15px rgba(0, 255, 65, 0.4);
        }

        .action-button.secondary:hover {
            box-shadow: 0 6px 20px rgba(0, 255, 65, 0.6);
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .action-bar {
                display: none;
            }

            .page-container {
                box-shadow: none;
                padding: 1in;
            }
        }

        @media (max-width: 768px) {
            .page-container {
                padding: 1.5rem;
            }

            .action-bar {
                top: 10px;
                right: 10px;
                flex-direction: column;
            }

            .action-button {
                padding: 0.75rem 1.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="action-bar">
        <button class="action-button" onclick="window.print()">📄 Print</button>
        <button class="action-button secondary" onclick="shareLink()">🔗 Share</button>
        <button class="action-button secondary" onclick="editData()">✏️ Edit</button>
    </div>

    <div class="page-container" id="lawsuitContent">
        <!-- Lawsuit content loaded here -->
    </div>

    <script>
        // Get lawsuit ID from URL (e.g., /view-lawsuit.html?id=12345)
        const urlParams = new URLSearchParams(window.location.search);
        const lawsuitId = urlParams.get('id') || 'demo';

        // Load lawsuit data
        function loadLawsuit() {
            let lawsuitData;

            if (lawsuitId === 'demo') {
                // Demo lawsuit
                lawsuitData = {
                    caseNumber: 'DEMO-2025-001',
                    court: 'UNITED STATES DISTRICT COURT\nWESTERN DISTRICT OF KENTUCKY\nLOUISVILLE DIVISION',
                    plaintiff: 'JOHN DOE',
                    defendant: 'LOUISVILLE METRO POLICE DEPARTMENT, et al.',
                    victimName: 'John Doe',
                    incidentDate: 'March 10, 2025',
                    location: 'Louisville, Kentucky',
                    officers: 'Badge #1234, Badge #5678',
                    injuries: 'Broken arm, facial lacerations, psychological trauma',
                    witnesses: 'Jane Smith, Robert Johnson',
                    transcript: 'I was walking home when two police officers approached me without cause. They demanded ID and when I asked why, they forcefully grabbed me, threw me to the ground, and broke my arm. There were witnesses who saw everything. I later learned there was body camera footage of the entire incident.'
                };
            } else {
                // Load from localStorage
                const stored = localStorage.getItem(`lawsuit_${lawsuitId}`);
                if (stored) {
                    lawsuitData = JSON.parse(stored);
                } else {
                    // No data found
                    document.getElementById('lawsuitContent').innerHTML = `
                        <div style="text-align: center; padding: 3rem;">
                            <h1>Data Not Found</h1>
                            <p>Lawsuit ID: ${lawsuitId}</p>
                            <p><a href="/workspace.html">Go back to workspace</a></p>
                        </div>
                    `;
                    return;
                }
            }

            // Render lawsuit
            renderLawsuit(lawsuitData);
        }

        function renderLawsuit(data) {
            const content = `
                <div class="header">
                    <h1>${data.court || 'UNITED STATES DISTRICT COURT'}</h1>
                    <div class="case-number">Case No. ${data.caseNumber || 'TBD'}</div>
                </div>

                <div class="parties">
                    <div class="parties-header">
                        ${data.plaintiff || data.victimName},<br>
                        <span style="margin-left: 4rem;">Plaintiff,</span>
                    </div>
                    <div style="text-align: center; margin: 1rem 0;">v.</div>
                    <div class="parties-header">
                        ${data.defendant || 'DEFENDANTS'},<br>
                        <span style="margin-left: 4rem;">Defendants.</span>
                    </div>
                </div>

                <div class="content">
                    <h2>COMPLAINT FOR DAMAGES AND INJUNCTIVE RELIEF</h2>

                    <p>Plaintiff ${data.plaintiff || data.victimName} ("Plaintiff"), by and through undersigned counsel, brings this action against Defendants and alleges as follows:</p>

                    <h2>PARTIES</h2>

                    <p>1. Plaintiff ${data.victimName} is a resident of ${data.location || 'Kentucky'}.</p>

                    <p>2. Defendant ${data.defendant || 'POLICE DEPARTMENT'} is a law enforcement agency operating in ${data.location || 'Kentucky'}.</p>

                    <h2>JURISDICTION AND VENUE</h2>

                    <p>3. This Court has jurisdiction pursuant to 28 U.S.C. §§ 1331 and 1343, as this action arises under the Constitution and laws of the United States, specifically 42 U.S.C. § 1983.</p>

                    <p>4. Venue is proper in this District pursuant to 28 U.S.C. § 1391(b).</p>

                    <h2>FACTUAL ALLEGATIONS</h2>

                    <p>5. On or about ${data.incidentDate}, Plaintiff was subjected to an unlawful assault by law enforcement officers employed by Defendants.</p>

                    <p>6. The incident occurred at or near ${data.location}.</p>

                    <p>7. The officers involved include: ${data.officers || 'officers to be identified'}.</p>

                    <p>8. As a result of this incident, Plaintiff suffered the following injuries: ${data.injuries || 'physical and psychological injuries'}.</p>

                    <p>9. The incident was witnessed by: ${data.witnesses || 'witnesses to be identified'}.</p>

                    <p>10. Plaintiff states: "${data.transcript}"</p>

                    <h2>CAUSES OF ACTION</h2>

                    <p><strong>COUNT I: Excessive Force in Violation of the Fourth Amendment (42 U.S.C. § 1983)</strong></p>

                    <p>11. Plaintiff incorporates all previous allegations.</p>

                    <p>12. Defendants' use of force against Plaintiff was objectively unreasonable and violated Plaintiff's Fourth Amendment right to be free from excessive force.</p>

                    <p>13. As a direct and proximate result of Defendants' unconstitutional conduct, Plaintiff suffered physical injuries, emotional distress, and other damages.</p>

                    <p><strong>COUNT II: Assault and Battery</strong></p>

                    <p>14. Plaintiff incorporates all previous allegations.</p>

                    <p>15. Defendants intentionally caused harmful and offensive contact with Plaintiff's person without consent or legal justification.</p>

                    <p>16. As a direct and proximate result, Plaintiff suffered damages.</p>

                    <h2>PRAYER FOR RELIEF</h2>

                    <p>WHEREFORE, Plaintiff respectfully requests that this Court enter judgment in Plaintiff's favor and against Defendants, and award:</p>

                    <p>A. Compensatory damages in an amount to be determined at trial;</p>

                    <p>B. Punitive damages;</p>

                    <p>C. Attorney's fees and costs pursuant to 42 U.S.C. § 1988;</p>

                    <p>D. Such other and further relief as this Court deems just and proper.</p>
                </div>

                <div class="signature-block">
                    <p>Respectfully submitted,</p>
                    <br>
                    <p>_________________________</p>
                    <p>Attorney for Plaintiff</p>
                    <p>Date: ${new Date().toLocaleDateString()}</p>
                </div>
            `;

            document.getElementById('lawsuitContent').innerHTML = content;
        }

        function shareLink() {
            const url = window.location.href;

            if (navigator.share) {
                navigator.share({
                    title: 'My Lawsuit',
                    text: 'View my lawsuit',
                    url: url
                }).catch(() => copyToClipboard(url));
            } else {
                copyToClipboard(url);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Link copied to clipboard!\n\nShare this link with your attorney.');
            });
        }

        function editData() {
            if (lawsuitId === 'demo') {
                alert('This is a demo. Go to your workspace to create your own lawsuit.');
                window.location.href = '/access.html';
            } else {
                // Go back to workspace to edit
                window.location.href = `/workspace.html?user=${lawsuitId}`;
            }
        }

        // Load on page load
        loadLawsuit();
    </script>

    <!-- Bug Notepad -->
    <script src="/UNIVERSAL_BUG_NOTEPAD_V2.js"></script>

<!-- Universal HUD - Auto-injected -->
<script src="/UNIVERSAL_AI_HUD.js"></script>


<!-- 🔍 VISITOR TRACKING & INTERCOM SYSTEM -->
<script src="/VISITOR_TRACKING_SNIPPET.js"></script>
</body>
</html>
