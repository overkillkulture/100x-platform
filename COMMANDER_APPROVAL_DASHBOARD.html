<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚪 Commander Approval Dashboard - GATES CLOSED</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #00ddff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(0, 221, 255, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #ff0055;
            margin-bottom: 30px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #00ff88;
        }

        .stat-label {
            font-size: 0.9em;
            color: #00ddff;
            margin-top: 5px;
        }

        .pending-list {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ddff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .pending-item {
            background: rgba(0, 221, 255, 0.05);
            border: 1px solid rgba(0, 221, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 2fr 2fr 1fr auto;
            gap: 15px;
            align-items: center;
        }

        .pending-item:hover {
            border-color: #00ddff;
            background: rgba(0, 221, 255, 0.1);
        }

        .info-field {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.8em;
            color: #00ff88;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1em;
            color: #fff;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-approve {
            background: #00ff88;
            color: #000;
        }

        .btn-approve:hover {
            background: #00ddff;
            transform: scale(1.05);
        }

        .btn-reject {
            background: #ff0055;
            color: #fff;
        }

        .btn-reject:hover {
            background: #ff3377;
            transform: scale(1.05);
        }

        .btn-refresh {
            background: #00ddff;
            color: #000;
            padding: 15px 30px;
            font-size: 1.1em;
            display: block;
            margin: 20px auto;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #00ff88;
            font-size: 1.2em;
        }

        .loading {
            text-align: center;
            color: #00ff88;
            font-size: 1.5em;
            margin: 40px 0;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00ff88;
            color: #000;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
            animation: slideIn 0.3s;
        }

        .notification.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚪 COMMANDER APPROVAL DASHBOARD</h1>
        <p class="subtitle">GATES CLOSED - DESTROYER FILTER ACTIVE</p>

        <div class="stats-bar" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="pendingCount">--</div>
                <div class="stat-label">PENDING APPROVAL</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="approvedCount">--</div>
                <div class="stat-label">APPROVED</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="rejectedCount">--</div>
                <div class="stat-label">REJECTED</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="approvalRate">--%</div>
                <div class="stat-label">APPROVAL RATE</div>
            </div>
        </div>

        <div class="pending-list">
            <h2 style="margin-bottom: 20px;">⏳ PENDING SIGNUPS</h2>
            <div id="pendingList">
                <div class="loading">Loading pending signups...</div>
            </div>
        </div>

        <button class="btn btn-refresh" onclick="loadPendingSignups()">🔄 REFRESH</button>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        const API_URL = 'http://localhost:8010';

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/api/stats`);
                const data = await response.json();

                document.getElementById('pendingCount').textContent = data.pending_count;
                document.getElementById('approvedCount').textContent = data.approved_count;
                document.getElementById('rejectedCount').textContent = data.rejected_count;
                document.getElementById('approvalRate').textContent = data.approval_rate;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadPendingSignups() {
            const listDiv = document.getElementById('pendingList');
            listDiv.innerHTML = '<div class="loading">Loading...</div>';

            try {
                const response = await fetch(`${API_URL}/api/pending-signups`);
                const data = await response.json();

                if (data.pending.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state">✅ NO PENDING SIGNUPS<br>All clear, Commander!</div>';
                    return;
                }

                listDiv.innerHTML = '';
                data.pending.forEach(signup => {
                    const item = document.createElement('div');
                    item.className = 'pending-item';
                    item.innerHTML = `
                        <div class="info-field">
                            <div class="info-label">NAME</div>
                            <div class="info-value">${signup.name}</div>
                        </div>
                        <div class="info-field">
                            <div class="info-label">EMAIL</div>
                            <div class="info-value">${signup.email}</div>
                        </div>
                        <div class="info-field">
                            <div class="info-label">SIGNUP DATE</div>
                            <div class="info-value">${new Date(signup.timestamp).toLocaleDateString()}</div>
                        </div>
                        <div class="actions">
                            <button class="btn btn-approve" onclick="approveSignup('${signup.email}')">✅ APPROVE</button>
                            <button class="btn btn-reject" onclick="rejectSignup('${signup.email}')">❌ REJECT</button>
                        </div>
                    `;
                    listDiv.appendChild(item);
                });

                loadStats();
            } catch (error) {
                console.error('Error loading signups:', error);
                listDiv.innerHTML = '<div class="empty-state" style="color: #ff0055;">⚠️ ERROR LOADING SIGNUPS<br>Make sure BETA_APPROVAL_SYSTEM.py is running on port 8010</div>';
            }
        }

        async function approveSignup(email) {
            if (!confirm(`APPROVE ${email} for beta access?`)) return;

            try {
                const response = await fetch(`${API_URL}/api/approve-signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                showNotification(`✅ ${email} APPROVED!`);
                loadPendingSignups();
            } catch (error) {
                console.error('Error approving signup:', error);
                showNotification('❌ ERROR - Approval failed');
            }
        }

        async function rejectSignup(email) {
            const reason = prompt(`REJECT ${email}?\n\nOptional rejection reason:`, 'Destroyer pattern detected');
            if (reason === null) return; // User cancelled

            try {
                const response = await fetch(`${API_URL}/api/reject-signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, reason })
                });

                const data = await response.json();
                showNotification(`❌ ${email} REJECTED`);
                loadPendingSignups();
            } catch (error) {
                console.error('Error rejecting signup:', error);
                showNotification('❌ ERROR - Rejection failed');
            }
        }

        // Load on page load
        loadPendingSignups();

        // Auto-refresh every 30 seconds
        setInterval(loadStats, 30000);
    </script>
    <script>
/**
 * FLOATING BUG REPORTER (INLINE)
 * Always-visible bug reporting widget in bottom-right corner
 */

(function() {
    // Create the floating bug reporter
    const bugReporter = document.createElement('div');
    bugReporter.id = 'floating-bug-reporter';
    bugReporter.innerHTML = `
        <style>
            #floating-bug-reporter {
                position: fixed;
                bottom: 20px;
                right: 20px;
                z-index: 999999;
                font-family: 'Courier New', monospace;
            }

            .bug-fab {
                width: 80px;
                height: 80px;
                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 2.5rem;
                cursor: pointer;
                box-shadow: 0 4px 20px rgba(255, 68, 68, 0.5);
                transition: all 0.3s;
                animation: pulse 2s infinite;
                border: 3px solid #fff;
            }

            .bug-fab:hover {
                transform: scale(1.1);
                box-shadow: 0 6px 30px rgba(255, 68, 68, 0.8);
            }

            @keyframes pulse {
                0%, 100% {
                    box-shadow: 0 4px 20px rgba(255, 68, 68, 0.5);
                }
                50% {
                    box-shadow: 0 4px 30px rgba(255, 68, 68, 0.8), 0 0 50px rgba(255, 68, 68, 0.3);
                }
            }

            .bug-panel {
                position: absolute;
                bottom: 100px;
                right: 0;
                width: 400px;
                max-height: 600px;
                background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
                border: 3px solid #ff4444;
                border-radius: 15px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                display: none;
                overflow: hidden;
            }

            .bug-panel.active {
                display: block;
                animation: slideUp 0.3s ease-out;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .bug-panel-header {
                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                color: #fff;
                padding: 20px;
                font-size: 1.3rem;
                font-weight: bold;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .bug-panel-close {
                background: none;
                border: none;
                color: #fff;
                font-size: 1.5rem;
                cursor: pointer;
                width: 30px;
                height: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                transition: background 0.2s;
            }

            .bug-panel-close:hover {
                background: rgba(255, 255, 255, 0.2);
            }

            .bug-panel-body {
                padding: 20px;
                color: #e8e8e8;
                max-height: 500px;
                overflow-y: auto;
            }

            .bug-notice {
                background: rgba(0, 255, 65, 0.1);
                border-left: 4px solid #00ff41;
                padding: 15px;
                margin-bottom: 20px;
                border-radius: 5px;
                font-size: 0.95rem;
                line-height: 1.6;
            }

            .bug-notice strong {
                color: #00ff41;
            }

            .bug-form-group {
                margin-bottom: 20px;
            }

            .bug-form-label {
                display: block;
                color: #ff6666;
                font-weight: bold;
                margin-bottom: 8px;
                font-size: 0.95rem;
            }

            .bug-form-input,
            .bug-form-textarea {
                width: 100%;
                background: rgba(255, 255, 255, 0.05);
                border: 2px solid #444;
                border-radius: 8px;
                padding: 12px;
                color: #e8e8e8;
                font-family: 'Courier New', monospace;
                font-size: 0.95rem;
                transition: border-color 0.3s;
            }

            .bug-form-input:focus,
            .bug-form-textarea:focus {
                outline: none;
                border-color: #ff4444;
                background: rgba(255, 68, 68, 0.05);
            }

            .bug-form-textarea {
                min-height: 120px;
                resize: vertical;
            }

            .bug-submit-btn {
                width: 100%;
                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                color: #fff;
                border: none;
                padding: 15px;
                border-radius: 8px;
                font-size: 1.1rem;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.3s;
                font-family: 'Courier New', monospace;
            }

            .bug-submit-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(255, 68, 68, 0.4);
            }

            .bug-submit-btn:active {
                transform: translateY(0);
            }

            .bug-badge {
                position: absolute;
                top: -5px;
                right: -5px;
                background: #00ff41;
                color: #000;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.8rem;
                font-weight: bold;
                border: 2px solid #fff;
            }

            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-track {
                background: #1a1a1a;
            }

            ::-webkit-scrollbar-thumb {
                background: #ff4444;
                border-radius: 4px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #ff6666;
            }
        </style>

        <div class="bug-fab" onclick="toggleBugPanel()">
            🐛
            <div class="bug-badge">!</div>
        </div>

        <div class="bug-panel" id="bug-panel">
            <div class="bug-panel-header">
                <span>🐛 REPORT A BUG</span>
                <button class="bug-panel-close" onclick="toggleBugPanel()">✕</button>
            </div>
            <div class="bug-panel-body">
                <div class="bug-notice">
                    <strong>📢 We check bugs every couple hours!</strong><br><br>
                    Found something broken? Report it here and we'll fix it ASAP.
                    Every bug report helps make the platform better for everyone.
                </div>

                <form id="bug-report-form" onsubmit="submitBugReport(event)">
                    <div class="bug-form-group">
                        <label class="bug-form-label">What's broken? (Short description)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-title"
                               placeholder="e.g., Login button doesn't work"
                               required>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Tell us more (What happened?)</label>
                        <textarea class="bug-form-textarea"
                                  id="bug-description"
                                  placeholder="Describe what you were doing when the bug occurred..."
                                  required></textarea>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Your Name/PIN (Optional)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-reporter"
                               placeholder="e.g., Joshua (PIN 1001)">
                    </div>

                    <button type="submit" class="bug-submit-btn">
                        🚀 SUBMIT BUG REPORT
                    </button>
                </form>
            </div>
        </div>
    `;

    // Add to page
    document.body.appendChild(bugReporter);

    // Make functions global
    window.toggleBugPanel = function() {
        const panel = document.getElementById('bug-panel');
        panel.classList.toggle('active');
    };

    window.submitBugReport = function(event) {
        event.preventDefault();

        const bugData = {
            id: 'bug_' + Date.now(),
            timestamp: new Date().toISOString(),
            title: document.getElementById('bug-title').value,
            description: document.getElementById('bug-description').value,
            reporter: document.getElementById('bug-reporter').value || 'Anonymous',
            url: window.location.href,
            userAgent: navigator.userAgent
        };

        // Save to localStorage
        const bugs = JSON.parse(localStorage.getItem('bugReports') || '[]');
        bugs.push(bugData);
        localStorage.setItem('bugReports', JSON.stringify(bugs));

        // Try to save to server
        fetch('/api/bug-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bugData)
        }).catch(() => {
            // Fallback: save to local file
            const blob = new Blob([JSON.stringify(bugData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `bug_${Date.now()}.json`;
            a.click();
        });

        // Show success message
        alert('✅ BUG REPORTED!\n\nThanks for reporting this bug. We check reports every couple hours and will fix it ASAP.\n\nYour feedback makes the platform better!');

        // Reset form
        document.getElementById('bug-report-form').reset();
        toggleBugPanel();
    };
})();
</script>
</body>
</html>
