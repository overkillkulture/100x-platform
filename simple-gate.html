<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100X Platform - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .gate-container {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            padding: 3rem;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 255, 136, 0.2);
        }

        .logo {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00ffff 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            text-align: center;
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00ff88;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #00ffff 0%, #00ff88 100%);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .toggle-mode {
            text-align: center;
            margin-top: 1.5rem;
            color: #888;
            font-size: 0.9rem;
        }

        .toggle-mode a {
            color: #00ff88;
            text-decoration: none;
            font-weight: bold;
        }

        .toggle-mode a:hover {
            text-decoration: underline;
        }

        .error {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }

        .success {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="gate-container">
        <div class="logo">🌀</div>
        <h1>100X Platform</h1>
        <p class="tagline">Consciousness Builder Workspace</p>

        <div class="error" id="errorMessage"></div>
        <div class="success" id="successMessage"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn">Enter Workspace</button>

            <div class="toggle-mode">
                Don't have an account? <a href="#" onclick="toggleMode(); return false;">Sign up</a>
            </div>
        </form>

        <!-- Signup Form (hidden by default) -->
        <form id="signupForm" style="display: none;">
            <div class="form-group">
                <label for="newUsername">Choose Username</label>
                <input type="text" id="newUsername" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label for="newEmail">Email Address</label>
                <input type="email" id="newEmail" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="newPhone">Phone Number (Optional)</label>
                <input type="tel" id="newPhone" placeholder="555-123-4567">
            </div>

            <div class="form-group">
                <label for="newPassword">Choose Password</label>
                <input type="password" id="newPassword" placeholder="Enter password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            </div>

            <button type="submit" class="btn">Create Account</button>

            <div class="toggle-mode">
                Already have an account? <a href="#" onclick="toggleMode(); return false;">Log in</a>
            </div>
        </form>
    </div>

    <script>
        // Simple user storage (localStorage)
        function getUsers() {
            const users = localStorage.getItem('100x_users');
            return users ? JSON.parse(users) : {};
        }

        function saveUsers(users) {
            localStorage.setItem('100x_users', JSON.stringify(users));
        }

        function toggleMode() {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');

            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
            }

            hideMessages();
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';

            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function login(username, password) {
            const users = getUsers();

            if (!users[username]) {
                showError('Username not found. Please sign up.');
                return false;
            }

            if (users[username].password !== password) {
                showError('Incorrect password.');
                return false;
            }

            // Login successful
            localStorage.setItem('workspace_user_id', username);
            localStorage.setItem('workspace_user_name', users[username].name || username);

            showSuccess('Login successful! Redirecting...');

            // Redirect to workspace
            setTimeout(() => {
                window.location.href = 'workspace-v3.html';
            }, 1000);

            return true;
        }

        async function signup(username, email, phone, password, confirmPassword) {
            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return false;
            }

            if (password.length < 4) {
                showError('Password must be at least 4 characters.');
                return false;
            }

            // BETA MODE: Allow account creation for now
            // Users should have already signed up via signup-for-updates.html
            const users = getUsers();

            if (users[username]) {
                showError('Username already exists. Please choose another.');
                return false;
            }

            // Create account
            users[username] = {
                username: username,
                email: email,
                phone: phone || '',
                password: password,
                name: username,
                created_at: new Date().toISOString(),
                beta_user: true
            };

            saveUsers(users);

            // Auto-login after signup
            localStorage.setItem('workspace_user_id', username);
            localStorage.setItem('workspace_user_name', username);

            showSuccess('Account created! Redirecting...');

            setTimeout(() => {
                window.location.href = 'workspace-v3.html';
            }, 1000);

            return true;
        }

        // Handle login form
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            login(username, password);
        });

        // Handle signup form
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('newUsername').value;
            const email = document.getElementById('newEmail').value;
            const phone = document.getElementById('newPhone').value;
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            await signup(username, email, phone, password, confirmPassword);
        });

        // Check if already logged in
        if (localStorage.getItem('workspace_user_id')) {
            showSuccess('Already logged in. Redirecting...');
            setTimeout(() => {
                window.location.href = 'workspace-v3.html';
            }, 1000);
        }
    </script>

    <script>
/**
 * FLOATING BUG REPORTER (INLINE)
 * Always-visible bug reporting widget in bottom-right corner
 */

(function() {
    // Create the floating bug reporter
    const bugReporter = document.createElement('div');
    bugReporter.id = 'floating-bug-reporter';
    bugReporter.innerHTML = `
        <style>
            #floating-bug-reporter {
                position: fixed;
                bottom: 20px;
                right: 20px;
                z-index: 999999;
                font-family: 'Courier New', monospace;
            }

            .bug-fab {
                width: 80px;
                height: 80px;
                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 2.5rem;
                cursor: pointer;
                box-shadow: 0 4px 20px rgba(255, 68, 68, 0.5);
                transition: all 0.3s;
                animation: pulse 2s infinite;
                border: 3px solid #fff;
            }

            .bug-fab:hover {
                transform: scale(1.1);
                box-shadow: 0 6px 30px rgba(255, 68, 68, 0.8);
            }

            @keyframes pulse {
                0%, 100% {
                    box-shadow: 0 4px 20px rgba(255, 68, 68, 0.5);
                }
                50% {
                    box-shadow: 0 4px 30px rgba(255, 68, 68, 0.8), 0 0 50px rgba(255, 68, 68, 0.3);
                }
            }

            .bug-panel {
                position: absolute;
                bottom: 100px;
                right: 0;
                width: 400px;
                max-height: 600px;
                background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
                border: 3px solid #ff4444;
                border-radius: 15px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                display: none;
                overflow: hidden;
            }

            .bug-panel.active {
                display: block;
                animation: slideUp 0.3s ease-out;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .bug-panel-header {
                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                color: #fff;
                padding: 20px;
                font-size: 1.3rem;
                font-weight: bold;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .bug-panel-close {
                background: none;
                border: none;
                color: #fff;
                font-size: 1.5rem;
                cursor: pointer;
                width: 30px;
                height: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                transition: background 0.2s;
            }

            .bug-panel-close:hover {
                background: rgba(255, 255, 255, 0.2);
            }

            .bug-panel-body {
                padding: 20px;
                color: #e8e8e8;
                max-height: 500px;
                overflow-y: auto;
            }

            .bug-notice {
                background: rgba(0, 255, 65, 0.1);
                border-left: 4px solid #00ff41;
                padding: 15px;
                margin-bottom: 20px;
                border-radius: 5px;
                font-size: 0.95rem;
                line-height: 1.6;
            }

            .bug-notice strong {
                color: #00ff41;
            }

            .bug-form-group {
                margin-bottom: 20px;
            }

            .bug-form-label {
                display: block;
                color: #ff6666;
                font-weight: bold;
                margin-bottom: 8px;
                font-size: 0.95rem;
            }

            .bug-form-input,
            .bug-form-textarea {
                width: 100%;
                background: rgba(255, 255, 255, 0.05);
                border: 2px solid #444;
                border-radius: 8px;
                padding: 12px;
                color: #e8e8e8;
                font-family: 'Courier New', monospace;
                font-size: 0.95rem;
                transition: border-color 0.3s;
            }

            .bug-form-input:focus,
            .bug-form-textarea:focus {
                outline: none;
                border-color: #ff4444;
                background: rgba(255, 68, 68, 0.05);
            }

            .bug-form-textarea {
                min-height: 120px;
                resize: vertical;
            }

            .bug-submit-btn {
                width: 100%;
                background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
                color: #fff;
                border: none;
                padding: 15px;
                border-radius: 8px;
                font-size: 1.1rem;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.3s;
                font-family: 'Courier New', monospace;
            }

            .bug-submit-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(255, 68, 68, 0.4);
            }

            .bug-submit-btn:active {
                transform: translateY(0);
            }

            .bug-badge {
                position: absolute;
                top: -5px;
                right: -5px;
                background: #00ff41;
                color: #000;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.8rem;
                font-weight: bold;

            ::-webkit-scrollbar-track {

                background: #ff4444;

            }

            ::-webkit-scrollbar-thumb:hover {
                background: #ff6666;
            }
        </style>

        <div class="bug-fab" onclick="toggleBugPanel()">
            🐛
            <div class="bug-badge">!</div>
        </div>

        <div class="bug-panel" id="bug-panel">
            <div class="bug-panel-header">
                <span>🐛 REPORT A BUG</span>
                <button class="bug-panel-close" onclick="toggleBugPanel()">✕</button>
            </div>
            <div class="bug-panel-body">
                <div class="bug-notice">
                    <strong>📢 We check bugs every couple hours!</strong><br><br>
                    Found something broken? Report it here and we'll fix it ASAP.
                    Every bug report helps make the platform better for everyone.
                </div>

                <form id="bug-report-form" onsubmit="submitBugReport(event)">
                    <div class="bug-form-group">
                        <label class="bug-form-label">What's broken? (Short description)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-title"
                               placeholder="e.g., Login button doesn't work"
                               required>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Tell us more (What happened?)</label>
                        <textarea class="bug-form-textarea"
                                  id="bug-description"
                                  placeholder="Describe what you were doing when the bug occurred..."
                                  required></textarea>
                    </div>

                    <div class="bug-form-group">
                        <label class="bug-form-label">Your Name/PIN (Optional)</label>
                        <input type="text"
                               class="bug-form-input"
                               id="bug-reporter"
                               placeholder="e.g., Joshua (PIN 1001)">
                    </div>

                    <button type="submit" class="bug-submit-btn">
                        🚀 SUBMIT BUG REPORT
                    </button>
                </form>
            </div>
        </div>
    `;

    // Add to page
    document.body.appendChild(bugReporter);

    // Make functions global
    window.toggleBugPanel = function() {
        const panel = document.getElementById('bug-panel');
        panel.classList.toggle('active');
    };

    window.submitBugReport = function(event) {
        event.preventDefault();

        const bugData = {
            id: 'bug_' + Date.now(),
            timestamp: new Date().toISOString(),
            title: document.getElementById('bug-title').value,
            description: document.getElementById('bug-description').value,
            reporter: document.getElementById('bug-reporter').value || 'Anonymous',
            url: window.location.href,
            userAgent: navigator.userAgent
        };

        // Save to localStorage
        const bugs = JSON.parse(localStorage.getItem('bugReports') || '[]');
        bugs.push(bugData);
        localStorage.setItem('bugReports', JSON.stringify(bugs));

        // Try to save to server
        fetch('/api/bug-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bugData)
        }).catch(() => {
            // Fallback: save to local file
            const blob = new Blob([JSON.stringify(bugData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `bug_${Date.now()}.json`;
            a.click();
        });

        // Show success message
        alert('✅ BUG REPORTED!\n\nThanks for reporting this bug. We check reports every couple hours and will fix it ASAP.\n\nYour feedback makes the platform better!');

        // Reset form
        document.getElementById('bug-report-form').reset();
        toggleBugPanel();
    };
})();
</script>

<div class="kindergarten-bug-box">
    <h3>🐛 Found a Bug?</h3>
    <textarea id="kindergarten-bug-input" placeholder="Type what's broken and hit submit..."></textarea>
    <button onclick="submitKindergartenBug()">Submit Bug</button>
    <div id="kindergarten-bug-status" class="kindergarten-bug-status"></div>
</div>

<script>
function submitKindergartenBug() {
    const input = document.getElementById('kindergarten-bug-input');
    const status = document.getElementById('kindergarten-bug-status');
    const text = input.value.trim();

    if (!text) {
        alert('Please describe the bug!');
        return;
    }

    const user = localStorage.getItem('workspace_user_name') || localStorage.getItem('current_user') || 'Anonymous';
    const timestamp = new Date().toISOString();
    const bugEntry = `[${timestamp}] [${user}] ${text}\n`;

    // Save to localStorage
    const existingBugs = localStorage.getItem('kindergarten_bugs') || '';
    localStorage.setItem('kindergarten_bugs', existingBugs + bugEntry);

    // Show success
    status.textContent = '✅ Bug saved! Thanks!';
    status.className = 'kindergarten-bug-status success show';
    input.value = '';

    // Hide status after 3 seconds
    setTimeout(() => {
        status.className = 'kindergarten-bug-status';
    }, 3000);
}

// Auto-submit with Enter key (Shift+Enter for new line)
document.getElementById('kindergarten-bug-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitKindergartenBug();
    }
});
</script>
