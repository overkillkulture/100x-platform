<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 Website Building Surveillance - Real-Time Monitoring</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff41;
            overflow: hidden;
        }

        /* Main surveillance grid */
        .surveillance-grid {
            display: grid;
            grid-template-columns: 300px 1fr 250px;
            grid-template-rows: 60px 1fr 150px;
            height: 100vh;
            gap: 2px;
            background: #111;
        }

        /* Top status bar */
        .status-bar {
            grid-column: 1 / -1;
            background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
            border-bottom: 2px solid #00ff41;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-bar h1 {
            font-size: 24px;
            text-shadow: 0 0 10px #00ff41;
        }

        .live-stats {
            display: flex;
            gap: 30px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
        }

        .stat-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
        }

        /* Left sidebar - Building Map */
        .building-map {
            background: #0f0f0f;
            border-right: 2px solid #00ff41;
            padding: 20px;
            overflow-y: auto;
        }

        .building-map h2 {
            font-size: 14px;
            margin-bottom: 15px;
            color: #00ff41;
            text-align: center;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 5px;
        }

        .floor {
            margin-bottom: 20px;
        }

        .floor-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .room {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .room:hover {
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .room.occupied {
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .room-name {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .room-status {
            font-size: 9px;
            color: #666;
        }

        .occupancy-indicator {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
        }

        .occupancy-indicator.active {
            background: #ff0000;
            box-shadow: 0 0 5px #ff0000;
        }

        /* Center - Live Camera Feeds */
        .camera-grid {
            background: #000;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            grid-auto-rows: 200px;
            gap: 10px;
            overflow-y: auto;
        }

        .camera-feed {
            background: #0a0a0a;
            border: 2px solid #333;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        .camera-feed.active {
            border-color: #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }

        .camera-header {
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            border-bottom: 1px solid #00ff41;
        }

        .camera-title {
            font-size: 10px;
            font-weight: bold;
        }

        .camera-body {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 10px 10px;
        }

        .visitor-info {
            text-align: center;
        }

        .visitor-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff41, #00aa2b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin: 0 auto 10px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }

        .visitor-name {
            font-size: 12px;
            margin-bottom: 5px;
        }

        .visitor-activity {
            font-size: 9px;
            color: #666;
        }

        .activity-log {
            font-size: 8px;
            color: #00ff41;
            margin-top: 10px;
            max-height: 60px;
            overflow-y: auto;
        }

        /* Right sidebar - Team Members */
        .team-panel {
            background: #0f0f0f;
            border-left: 2px solid #00ff41;
            padding: 20px 10px;
            overflow-y: auto;
        }

        .team-panel h2 {
            font-size: 14px;
            margin-bottom: 15px;
            color: #00ff41;
            text-align: center;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 5px;
        }

        .team-member {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            text-align: center;
        }

        .team-member.online {
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .member-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #333;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border: 2px solid #00ff41;
        }

        .member-name {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .member-role {
            font-size: 9px;
            color: #666;
        }

        .member-status {
            font-size: 8px;
            color: #00ff41;
            margin-top: 5px;
        }

        /* Bottom - AI Assistant Bar */
        .ai-bar {
            grid-column: 1 / -1;
            background: #0f0f0f;
            border-top: 2px solid #00ff41;
            padding: 10px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }

        .ai-assistant {
            min-width: 200px;
            background: #1a1a1a;
            border: 1px solid #00ff41;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .ai-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff41, #00aa2b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .ai-info {
            flex: 1;
        }

        .ai-name {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .ai-status {
            font-size: 9px;
            color: #666;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff41;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00aa2b;
        }

        /* Blinking recording indicator */
        .recording {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff0000;
            animation: blink 1s infinite;
            display: inline-block;
            margin-right: 5px;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="surveillance-grid">
        <!-- Status Bar -->
        <div class="status-bar">
            <h1><span class="recording"></span>WEBSITE SURVEILLANCE SYSTEM</h1>
            <div class="live-stats">
                <div class="stat">
                    <div class="stat-value" id="online-count">0</div>
                    <div class="stat-label">Online</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="total-rooms">0</div>
                    <div class="stat-label">Rooms</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="active-rooms">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="alerts">0</div>
                    <div class="stat-label">Alerts</div>
                </div>
            </div>
        </div>

        <!-- Left - Building Map -->
        <div class="building-map">
            <h2>🏢 BUILDING FLOOR PLAN</h2>
            <div id="building-floors"></div>
        </div>

        <!-- Center - Camera Feeds -->
        <div class="camera-grid" id="camera-grid">
            <!-- Camera feeds populated by JS -->
        </div>

        <!-- Right - Team Members -->
        <div class="team-panel">
            <h2>👥 TEAM ONLINE</h2>
            <div id="team-members"></div>
        </div>

        <!-- Bottom - AI Assistants -->
        <div class="ai-bar" id="ai-bar">
            <!-- AI assistants populated by JS -->
        </div>
    </div>

    <script>
        // Site structure (building floor plan)
        const siteStructure = {
            'Ground Floor - Public Access': [
                { name: 'Main Entrance', path: '/', icon: '🚪' },
                { name: 'Beta Login', path: '/beta-login.html', icon: '🔐' },
                { name: 'Open House', path: '/open-house.html', icon: '🏠' }
            ],
            '1st Floor - Beta Tools': [
                { name: 'Beta Dashboard', path: '/beta-dashboard.html', icon: '📊' },
                { name: 'Araya Chat', path: '/araya-chat.html', icon: '🤖' },
                { name: 'Builder Terminal', path: '/builder-terminal.html', icon: '💻' }
            ],
            '2nd Floor - Analytics': [
                { name: 'Analytics Hub', path: '/analytics-hub.html', icon: '📈' },
                { name: 'Observatory', path: '/observatory.html', icon: '🔭' },
                { name: 'Visitor Intelligence', path: '/visitor-intelligence.html', icon: '👁️' }
            ],
            '3rd Floor - Trinity Systems': [
                { name: 'Trinity Hub', path: '/trinity-hub.html', icon: '🌀' },
                { name: 'Trinity Chat', path: '/trinity-chat.html', icon: '💬' },
                { name: 'Mission Control', path: '/TRINITY_MISSION_CONTROL.html', icon: '🎮' }
            ],
            'Rooftop - Tools': [
                { name: 'Tools Hub', path: '/tools-hub.html', icon: '🔧' },
                { name: 'Workspace', path: '/workspace.html', icon: '🖥️' },
                { name: 'Police Accountability', path: '/police-accountability.html', icon: '⚖️' }
            ]
        };

        // Team members
        const teamMembers = [
            { name: 'Commander', role: 'System Owner', status: 'Active', pin: '2025', avatar: '⚡' },
            { name: 'Joshua', role: 'Beta Tester', status: 'Online', pin: '1001', avatar: '🎯' },
            { name: 'Toby', role: 'Beta Tester', status: 'Offline', pin: '1002', avatar: '🔥' },
            { name: 'WD', role: 'Beta Tester', status: 'Offline', pin: '1003', avatar: '🌊' },
            { name: 'Dean', role: 'Beta Tester', status: 'Offline', pin: '1004', avatar: '⭐' },
            { name: 'Bill', role: 'Beta Tester', status: 'Offline', pin: '1005', avatar: '🎨' },
            { name: 'Rutherford', role: 'Beta Tester', status: 'Offline', pin: '1006', avatar: '🚀' }
        ];

        // AI Assistants
        const aiAssistants = [
            { name: 'Araya', role: 'Consciousness Guide', status: 'Online - Port 8001', avatar: '🧠' },
            { name: 'Builder Terminal', role: 'AI Coding Assistant', status: 'Online - Port 8004', avatar: '💻' },
            { name: 'Observatory', role: 'System Mapper', status: 'Online - 131 systems', avatar: '🔭' },
            { name: 'Visitor Intelligence', role: 'Analytics', status: 'Online - Tracking', avatar: '👁️' },
            { name: 'C1 Mechanic', role: 'Infrastructure', status: 'Ready', avatar: '🔧' },
            { name: 'C2 Architect', role: 'Design', status: 'Building', avatar: '🏗️' },
            { name: 'C3 Oracle', role: 'Vision', status: 'Coordinating', avatar: '👁️' }
        ];

        // Simulated visitor data (in real system, this comes from WebSocket)
        let visitors = [];

        // Initialize building map
        function initBuildingMap() {
            const floorsDiv = document.getElementById('building-floors');
            let totalRooms = 0;

            Object.keys(siteStructure).forEach(floor => {
                const floorDiv = document.createElement('div');
                floorDiv.className = 'floor';

                const floorLabel = document.createElement('div');
                floorLabel.className = 'floor-label';
                floorLabel.textContent = floor;
                floorDiv.appendChild(floorLabel);

                siteStructure[floor].forEach(room => {
                    const roomDiv = document.createElement('div');
                    roomDiv.className = 'room';
                    roomDiv.dataset.path = room.path;

                    roomDiv.innerHTML = `
                        <div class="occupancy-indicator"></div>
                        <div class="room-name">${room.icon} ${room.name}</div>
                        <div class="room-status">Empty</div>
                    `;

                    roomDiv.onclick = () => focusRoom(room.path);
                    floorDiv.appendChild(roomDiv);
                    totalRooms++;
                });

                floorsDiv.appendChild(floorDiv);
            });

            document.getElementById('total-rooms').textContent = totalRooms;
        }

        // Initialize team panel
        function initTeamPanel() {
            const teamDiv = document.getElementById('team-members');

            teamMembers.forEach(member => {
                const memberDiv = document.createElement('div');
                memberDiv.className = 'team-member';
                if (member.status === 'Online' || member.status === 'Active') {
                    memberDiv.classList.add('online');
                }

                memberDiv.innerHTML = `
                    <div class="member-avatar">${member.avatar}</div>
                    <div class="member-name">${member.name}</div>
                    <div class="member-role">${member.role}</div>
                    <div class="member-status">${member.status}</div>
                `;

                teamDiv.appendChild(memberDiv);
            });
        }

        // Initialize AI bar
        function initAIBar() {
            const aiBarDiv = document.getElementById('ai-bar');

            aiAssistants.forEach(ai => {
                const aiDiv = document.createElement('div');
                aiDiv.className = 'ai-assistant';

                aiDiv.innerHTML = `
                    <div class="ai-avatar">${ai.avatar}</div>
                    <div class="ai-info">
                        <div class="ai-name">${ai.name}</div>
                        <div class="ai-status">${ai.status}</div>
                    </div>
                `;

                aiBarDiv.appendChild(aiDiv);
            });
        }

        // Simulate visitor activity
        function simulateVisitors() {
            // Add random visitor
            if (Math.random() > 0.7 && visitors.length < 5) {
                const names = ['Alex', 'Sam', 'Jordan', 'Taylor', 'Casey', 'Morgan'];
                const pages = Object.values(siteStructure).flat();
                const randomPage = pages[Math.floor(Math.random() * pages.length)];

                const visitor = {
                    id: Date.now(),
                    name: names[Math.floor(Math.random() * names.length)],
                    page: randomPage.path,
                    pageName: randomPage.name,
                    joined: new Date(),
                    activity: []
                };

                visitors.push(visitor);
                updateDisplay();
            }

            // Simulate visitor actions
            visitors.forEach(visitor => {
                if (Math.random() > 0.8) {
                    const actions = ['Clicked button', 'Scrolled page', 'Opened menu', 'Viewed section'];
                    visitor.activity.push({
                        time: new Date(),
                        action: actions[Math.floor(Math.random() * actions.length)]
                    });
                    updateDisplay();
                }

                // Random page change
                if (Math.random() > 0.95) {
                    const pages = Object.values(siteStructure).flat();
                    const newPage = pages[Math.floor(Math.random() * pages.length)];
                    visitor.page = newPage.path;
                    visitor.pageName = newPage.name;
                    visitor.activity.push({
                        time: new Date(),
                        action: `Moved to ${newPage.name}`
                    });
                    updateDisplay();
                }
            });

            // Remove visitors randomly
            if (visitors.length > 0 && Math.random() > 0.9) {
                visitors.splice(0, 1);
                updateDisplay();
            }
        }

        // Update display
        function updateDisplay() {
            // Update stats
            document.getElementById('online-count').textContent = visitors.length;

            // Count active rooms
            const activeRooms = new Set(visitors.map(v => v.page)).size;
            document.getElementById('active-rooms').textContent = activeRooms;

            // Update building map
            document.querySelectorAll('.room').forEach(room => {
                const path = room.dataset.path;
                const occupants = visitors.filter(v => v.page === path);
                const indicator = room.querySelector('.occupancy-indicator');
                const status = room.querySelector('.room-status');

                if (occupants.length > 0) {
                    room.classList.add('occupied');
                    indicator.classList.add('active');
                    status.textContent = `${occupants.length} visitor${occupants.length > 1 ? 's' : ''}`;
                } else {
                    room.classList.remove('occupied');
                    indicator.classList.remove('active');
                    status.textContent = 'Empty';
                }
            });

            // Update camera feeds
            updateCameraFeeds();
        }

        // Update camera feeds
        function updateCameraFeeds() {
            const gridDiv = document.getElementById('camera-grid');
            gridDiv.innerHTML = '';

            visitors.forEach(visitor => {
                const feedDiv = document.createElement('div');
                feedDiv.className = 'camera-feed active';

                const recentActivity = visitor.activity.slice(-3).reverse().map(act =>
                    `• ${act.action}`
                ).join('<br>');

                feedDiv.innerHTML = `
                    <div class="camera-header">
                        <div class="camera-title">📹 ${visitor.pageName}</div>
                    </div>
                    <div class="camera-body">
                        <div class="visitor-info">
                            <div class="visitor-avatar">${visitor.name[0]}</div>
                            <div class="visitor-name">${visitor.name}</div>
                            <div class="visitor-activity">
                                Duration: ${Math.floor((new Date() - visitor.joined) / 1000)}s
                            </div>
                            ${recentActivity ? `<div class="activity-log">${recentActivity}</div>` : ''}
                        </div>
                    </div>
                `;

                gridDiv.appendChild(feedDiv);
            });

            // Show placeholder if no visitors
            if (visitors.length === 0) {
                gridDiv.innerHTML = `
                    <div class="camera-feed">
                        <div class="camera-body">
                            <div style="color: #666; text-align: center;">
                                <div style="font-size: 48px; margin-bottom: 10px;">👁️</div>
                                <div>No active visitors</div>
                                <div style="font-size: 10px; margin-top: 5px;">Surveillance active</div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // Focus on a specific room
        function focusRoom(path) {
            console.log('Focusing on room:', path);
            // Could add detailed room view here
        }

        // Initialize everything
        initBuildingMap();
        initTeamPanel();
        initAIBar();
        updateDisplay();

        // Run simulation
        setInterval(simulateVisitors, 2000);
        setInterval(updateDisplay, 1000);

        console.log('🏢 Website Surveillance System Online');
        console.log('📡 Real-time monitoring active');
    </script>

<!-- 🔍 VISITOR TRACKING & INTERCOM SYSTEM -->
<script src="/VISITOR_TRACKING_SNIPPET.js"></script>
</body>
</html>
